<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>太空赛跑 - 谁能最快到达太阳？</title>
    <link rel="preconnect" href="https://fonts.loli.net">
    <link href="https://fonts.loli.net/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3a 50%, #0a0a2a 100%);
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        .star { position: absolute; border-radius: 50%; background: #fff; animation: twinkle 3s infinite alternate; }
        @keyframes twinkle { 0% { opacity: 0.3; } 100% { opacity: 1; } }

        .container {
            position: relative; z-index: 1;
            max-width: 820px; margin: 0 auto;
            padding: 20px 16px 60px;
        }

        /* ============ Header ============ */
        .header { text-align: center; margin-bottom: 20px; position: relative; }
        .back-btn {
            position: absolute; left: 0; top: 4px;
            color: rgba(255,255,255,0.5); text-decoration: none; font-size: 0.9rem;
            transition: color 0.2s;
        }
        .back-btn:hover { color: #fff; }
        .header h1 {
            font-size: 1.8rem; font-weight: 900;
            background: linear-gradient(135deg, #ff9800, #ffd54f);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .subtitle { color: rgba(255,255,255,0.5); font-size: 0.95rem; margin-top: 4px; }

        /* ============ Tab Buttons ============ */
        .target-tabs { display: flex; gap: 6px; margin-bottom: 14px; overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 4px; justify-content: flex-start; }
        .tab-btn {
            padding: 8px 18px; border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.6); font-size: 0.88rem; font-weight: 700;
            cursor: pointer; transition: all 0.3s; font-family: inherit; white-space: nowrap; flex-shrink: 0;
        }
        .tab-btn:hover { background: rgba(255,255,255,0.1); }
        .tab-btn.active { background: rgba(255,152,0,0.2); border-color: #ff9800; color: #ff9800; }

        /* ============ 3D Scene ============ */
        .scene-wrap {
            position: relative; width: 100%; height: 240px;
            border-radius: 14px; overflow: hidden; margin: 20px 0;
            background: radial-gradient(ellipse at 70% 50%, rgba(40,25,10,0.4) 0%, transparent 60%),
                        linear-gradient(135deg, #05051a 0%, #0a0a2a 100%);
            border: 1px solid rgba(255,255,255,0.06);
        }
        #scene3d { width: 100%; height: 100%; cursor: grab; }
        #scene3d:active { cursor: grabbing; }
        #scene3d canvas { display: block; width: 100%; height: 100%; }
        .scene-hint {
            position: absolute; bottom: 8px; right: 12px;
            font-size: 0.65rem; color: rgba(255,255,255,0.25);
            pointer-events: none; transition: opacity 0.5s;
        }
        .scene-hint.hidden { opacity: 0; }

        /* ============ Intro ============ */
        .intro {
            text-align: center; font-size: 0.9rem; color: rgba(255,255,255,0.6);
            margin-bottom: 20px; line-height: 1.7;
        }

        /* ============ Tracks ============ */
        .tracks { display: flex; flex-direction: column; gap: 6px; margin-bottom: 20px; }
        .track {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px; padding: 10px 14px;
            cursor: pointer; transition: all 0.3s ease;
        }
        .track:hover { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.15); }
        .track.arrived { border-color: #ffd54f; box-shadow: 0 0 12px rgba(255,213,77,0.2); }

        .track-main { display: flex; align-items: center; gap: 10px; }
        .track-info { display: flex; align-items: center; gap: 8px; min-width: 110px; flex-shrink: 0; }
        .track-icon { font-size: 1.4rem; width: 28px; text-align: center; }
        .track-name { font-weight: 700; font-size: 0.9rem; white-space: nowrap; }
        .track-speed { font-size: 0.7rem; color: rgba(255,255,255,0.35); }

        .track-bar-wrap {
            flex: 1; height: 22px; min-width: 80px;
            background: rgba(255,255,255,0.06); border-radius: 11px;
            position: relative; overflow: hidden;
        }
        .track-bar-fill {
            height: 100%; width: 0%; border-radius: 11px;
            position: relative; min-width: 0;
        }
        .track-bar-fill.animate { transition: width 0.15s linear; }

        .track-status { min-width: 90px; text-align: right; font-size: 0.82rem; color: rgba(255,255,255,0.6); flex-shrink: 0; }
        .track-status.done { color: #ffd54f; font-weight: 700; }

        /* ============ Arrival Banner ============ */
        .arrival-banner {
            max-height: 0; overflow: hidden; opacity: 0;
            transition: max-height 0.4s ease, opacity 0.4s ease, margin 0.3s ease;
            font-size: 0.85rem; color: #ffd54f; padding-left: 46px;
        }
        .arrival-banner.show { max-height: 40px; opacity: 1; margin-top: 6px; }

        /* ============ Journey Card ============ */
        .journey-card {
            max-height: 0; overflow: hidden;
            transition: max-height 0.5s ease, margin 0.3s ease;
        }
        .journey-card.expanded { max-height: 500px; margin-top: 10px; }

        .journey-inner {
            background: rgba(255,255,255,0.05); border-radius: 10px; padding: 14px 16px;
        }
        .journey-title { font-size: 0.95rem; font-weight: 700; margin-bottom: 12px; }

        .milestone {
            display: flex; gap: 10px; padding: 7px 0 7px 14px;
            border-left: 2px solid var(--tc); margin-left: 5px; position: relative;
        }
        .milestone::before {
            content: ''; position: absolute; left: -6px; top: 11px;
            width: 10px; height: 10px; border-radius: 50%; background: var(--tc);
        }
        .milestone:last-of-type { border-left-color: transparent; }
        .milestone-time { font-weight: 700; min-width: 85px; font-size: 0.85rem; flex-shrink: 0; }
        .milestone-body { flex: 1; }
        .milestone-label { font-size: 0.85rem; color: rgba(255,255,255,0.8); }
        .milestone-fun { font-size: 0.78rem; color: rgba(255,255,255,0.4); margin-top: 2px; }

        .journey-fact {
            margin-top: 10px; padding: 8px 12px;
            background: rgba(255,215,77,0.08); border-radius: 8px;
            font-size: 0.85rem; color: #ffd54f;
        }

        /* ============ Controls ============ */
        .controls {
            background: rgba(255,255,255,0.04); border-radius: 12px;
            padding: 14px 16px; margin-bottom: 18px;
        }
        .timer-row { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 10px; }
        .timer-label { color: rgba(255,255,255,0.5); font-size: 0.9rem; }
        .timer-value { font-size: 1.15rem; font-weight: 700; color: #ffd54f; min-width: 100px; }

        .speed-row { display: flex; align-items: center; justify-content: center; gap: 8px; flex-wrap: wrap; }
        .speed-label { font-size: 0.8rem; color: rgba(255,255,255,0.4); }
        .speed-btn {
            padding: 5px 12px; border-radius: 18px;
            border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.7); font-size: 0.82rem; cursor: pointer; transition: all 0.2s;
            font-family: inherit;
        }
        .speed-btn:hover { background: rgba(255,255,255,0.1); }
        .speed-btn.active { background: rgba(255,152,0,0.2); border-color: #ff9800; color: #ff9800; }
        .speed-hint { width: 100%; text-align: center; font-size: 0.75rem; color: rgba(255,255,255,0.3); margin-top: 6px; }

        /* ============ Action Buttons ============ */
        .action-area { display: flex; justify-content: center; gap: 12px; margin-bottom: 20px; }
        .btn-primary {
            padding: 12px 36px; font-size: 1.2rem; font-weight: 700;
            border: none; border-radius: 28px;
            background: linear-gradient(135deg, #ff9800, #ff5722);
            color: #fff; cursor: pointer; transition: all 0.3s; font-family: inherit;
        }
        .btn-primary:hover { transform: scale(1.05); box-shadow: 0 8px 25px rgba(255,152,0,0.3); }
        .btn-secondary {
            padding: 10px 22px; font-size: 0.95rem; font-weight: 700;
            border: 1px solid rgba(255,255,255,0.2); border-radius: 22px;
            background: rgba(255,255,255,0.06); color: #fff;
            cursor: pointer; transition: all 0.2s; font-family: inherit;
        }
        .btn-secondary:hover { background: rgba(255,255,255,0.12); }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255,152,0,0.4); }
            70% { box-shadow: 0 0 0 14px rgba(255,152,0,0); }
            100% { box-shadow: 0 0 0 0 rgba(255,152,0,0); }
        }
        .pulse { animation: pulse 2s infinite; }

        /* ============ Finish ============ */
        .finish { display: none; text-align: center; padding: 20px; background: rgba(255,215,77,0.08); border: 1px solid rgba(255,215,77,0.2); border-radius: 14px; margin-top: 10px; }
        .finish.show { display: block; }
        .finish-title { font-size: 1.3rem; font-weight: 900; margin-bottom: 8px; }
        .finish-ranks { text-align: left; display: inline-block; font-size: 0.9rem; line-height: 1.8; }
        .finish-footer { margin-top: 12px; font-size: 0.85rem; color: rgba(255,255,255,0.6); }

        /* ============ Responsive ============ */
        @media (max-width: 600px) {
            .header h1 { font-size: 1.4rem; }
            .scene-wrap { height: 180px; }
            .track-info { min-width: 90px; }
            .track-bar-wrap { height: 18px; }
            .track-status { min-width: 70px; font-size: 0.78rem; }
            .speed-btn { padding: 4px 10px; font-size: 0.78rem; }
            .btn-primary { padding: 10px 28px; font-size: 1.1rem; }
            .milestone-time { min-width: 70px; font-size: 0.8rem; }
            .arrival-banner { padding-left: 38px; font-size: 0.8rem; }
            .tab-btn { padding: 6px 14px; font-size: 0.82rem; }
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>
    <div class="container">
        <header class="header">
            <a href="../index.html" class="back-btn">← 返回乐园</a>
            <h1>☀️ 太空赛跑</h1>
            <p class="subtitle" id="subtitleText">谁能最快到达太阳？</p>
        </header>

        <div class="target-tabs">
            <button class="tab-btn" data-target="mercury" onclick="switchTarget('mercury')">☿ 水星</button>
            <button class="tab-btn" data-target="venus" onclick="switchTarget('venus')">♀ 金星</button>
            <button class="tab-btn active" data-target="earth" onclick="switchTarget('earth')">🌍 地球</button>
            <button class="tab-btn" data-target="mars" onclick="switchTarget('mars')">🔴 火星</button>
            <button class="tab-btn" data-target="jupiter" onclick="switchTarget('jupiter')">🟤 木星</button>
            <button class="tab-btn" data-target="saturn" onclick="switchTarget('saturn')">🪐 土星</button>
            <button class="tab-btn" data-target="uranus" onclick="switchTarget('uranus')">🔵 天王星</button>
            <button class="tab-btn" data-target="neptune" onclick="switchTarget('neptune')">🌊 海王星</button>
            <button class="tab-btn" data-target="pluto" onclick="switchTarget('pluto')">⚪ 冥王星</button>
        </div>

        <div class="scene-wrap">
            <div id="scene3d"></div>
            <div class="scene-hint" id="sceneHint">🖱️ 拖动旋转</div>
        </div>

        <p class="intro" id="introText">地球到太阳有 1 亿 5 千万公里远！<br>坐不同的交通工具出发，要多久才能到呢？点击赛道查看旅程故事！</p>

        <div id="exploreLink" style="text-align:center; margin-bottom:18px;">
            <a href="sun-distance-explore.html" target="_blank" style="
                display:inline-block; padding:10px 24px; border-radius:24px;
                background:linear-gradient(135deg, #1a237e, #0d47a1, #01579b);
                color:#fff; text-decoration:none; font-size:0.95rem; font-weight:700;
                border:1px solid rgba(100,180,255,0.3);
                box-shadow:0 4px 15px rgba(30,90,200,0.3);
                transition:all 0.3s;
            " onmouseover="this.style.transform='scale(1.05)';this.style.boxShadow='0 6px 20px rgba(30,90,200,0.5)'"
               onmouseout="this.style.transform='scale(1)';this.style.boxShadow='0 4px 15px rgba(30,90,200,0.3)'">
                🔭 探索地日距离 3D 之旅
            </a>
        </div>

        <div id="tracks" class="tracks"></div>

        <div class="controls" id="controls">
            <div class="timer-row">
                <span class="timer-label">⏱️ 已过去</span>
                <span class="timer-value" id="timer">0 秒</span>
            </div>
            <div class="speed-row">
                <span class="speed-label">倍率</span>
                <button class="speed-btn" data-speed="10000">1万x</button>
                <button class="speed-btn" data-speed="1000000">100万x</button>
                <button class="speed-btn active" data-speed="100000000">1亿x</button>
                <button class="speed-btn" data-speed="1000000000">10亿x</button>
                <button class="speed-btn" data-speed="10000000000">100亿x</button>
                <div class="speed-hint" id="speedHint">1秒 ≈ 3.2年，适合观看飞机、高铁、汽车</div>
            </div>
        </div>

        <div class="action-area" id="actionArea">
            <button class="btn-primary pulse" id="startBtn">🏁 出发！</button>
        </div>

        <div class="finish" id="finish">
            <div class="finish-title">🎉 比赛结束！</div>
            <div class="finish-ranks" id="finishRanks"></div>
            <div class="finish-footer" id="finishFooter"></div>
        </div>
    </div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
// ============ 3D 太阳系全景场景 ============
(function() {
    const container = document.getElementById('scene3d');
    if (!container) return;

    const AU = 8; // 1 AU = 8 场景单位
    const SUN_R = 2.5;
    const PLANETS = [
        { name: '水星', au: 0.39, r: 0.25, tex: 'textures/mercury.jpg' },
        { name: '金星', au: 0.72, r: 0.45, tex: 'textures/venus_atmosphere.jpg' },
        { name: '地球', au: 1.0, r: 0.5, tex: 'textures/earth_daymap.jpg', isEarth: true },
        { name: '火星', au: 1.52, r: 0.3, tex: 'textures/mars.jpg' },
        { name: '木星', au: 5.2, r: 1.5, tex: 'textures/jupiter.jpg' },
        { name: '土星', au: 9.54, r: 1.2, tex: 'textures/saturn.jpg', hasRing: true },
        { name: '天王星', au: 19.19, r: 0.8, tex: 'textures/uranus.jpg' },
        { name: '海王星', au: 30.07, r: 0.7, tex: 'textures/neptune.jpg' },
        { name: '冥王星', au: 39.48, r: 0.2, tex: 'textures/pluto.jpg' },
    ];
    const VIEWS = {
        mercury:{ pos: [1.5, 3, 12],   look: [1.5, 0, 0],  minD: 8,  maxD: 40 },
        venus:  { pos: [3, 4, 18],     look: [3, 0, 0],     minD: 10, maxD: 50 },
        earth:  { pos: [4, 5, 25],     look: [4, 0, 0],     minD: 12, maxD: 80 },
        mars:   { pos: [6, 5, 28],     look: [6, 0, 0],     minD: 12, maxD: 80 },
        jupiter:{ pos: [20, 8, 60],    look: [20, 0, 0],    minD: 25, maxD: 120 },
        saturn: { pos: [38, 10, 100],  look: [38, 0, 0],    minD: 30, maxD: 200 },
        uranus: { pos: [60, 12, 140],  look: [60, 0, 0],    minD: 40, maxD: 400 },
        neptune:{ pos: [120, 15, 250], look: [120, 0, 0],   minD: 60, maxD: 500 },
        pluto:  { pos: [158, 18, 320], look: [158, 0, 0],   minD: 80, maxD: 600 },
    };

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    container.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 1000);
    camera.position.set(4, 5, 25);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.target.set(4, 0, 0);
    controls.enablePan = false; controls.enableZoom = true;
    controls.minDistance = 12; controls.maxDistance = 80;
    controls.maxPolarAngle = Math.PI * 0.85; controls.minPolarAngle = Math.PI * 0.15;
    controls.enableDamping = true; controls.dampingFactor = 0.08; controls.rotateSpeed = 0.5;

    let hintHidden = false;
    controls.addEventListener('start', () => {
        if (!hintHidden) {
            const h = document.getElementById('sceneHint');
            if (h) h.classList.add('hidden');
            hintHidden = true;
        }
    });

    scene.add(new THREE.AmbientLight(0x334466, 0.6));
    const textureLoader = new THREE.TextureLoader();

    // ============ 太阳 ============
    const sunMat = new THREE.ShaderMaterial({
        uniforms: { time: { value: 0 } },
        vertexShader: `varying vec3 vNormal; varying vec2 vUv;
            void main(){ vNormal=normalize(normalMatrix*normal); vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
        fragmentShader: `uniform float time; varying vec3 vNormal; varying vec2 vUv;
            float noise(vec2 p){return fract(sin(dot(p,vec2(12.9898,78.233)))*43758.5453);}
            float fbm(vec2 p){float v=0.,a=.5;for(int i=0;i<5;i++){v+=a*noise(p);p*=2.;a*=.5;}return v;}
            void main(){float n=fbm(vUv*10.+time*.1);float n2=fbm(vUv*20.-time*.15);
            vec3 c=mix(mix(vec3(1,.95,.5),vec3(1,.7,.2),n),vec3(1,.5,.1),n2*.3);
            c+=vec3(1,.6,.2)*pow(1.-dot(vNormal,vec3(0,0,1)),2.)*.5;gl_FragColor=vec4(c,1.);}`
    });
    const sunMesh = new THREE.Mesh(new THREE.SphereGeometry(SUN_R, 64, 64), sunMat);
    sunMesh.position.set(0, 0, 0);
    scene.add(sunMesh);

    const coronaMat = new THREE.ShaderMaterial({
        uniforms: { time: { value: 0 } },
        vertexShader: `varying vec3 vN;void main(){vN=normalize(normalMatrix*normal);gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
        fragmentShader: `uniform float time;varying vec3 vN;void main(){float i=pow(.6-dot(vN,vec3(0,0,1)),2.);gl_FragColor=vec4(vec3(1,.7,.2)*i*(sin(time*2.)*.1+.9),i*.6);}`,
        transparent: true, blending: THREE.AdditiveBlending, side: THREE.BackSide
    });
    sunMesh.add(new THREE.Mesh(new THREE.SphereGeometry(SUN_R*1.25,32,32), coronaMat));
    const outerGlowMat = new THREE.ShaderMaterial({
        vertexShader: `varying vec3 vN;void main(){vN=normalize(normalMatrix*normal);gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
        fragmentShader: `varying vec3 vN;void main(){float i=pow(.4-dot(vN,vec3(0,0,1)),3.);gl_FragColor=vec4(vec3(1,.5,.1)*i,i*.3);}`,
        transparent: true, blending: THREE.AdditiveBlending, side: THREE.BackSide
    });
    sunMesh.add(new THREE.Mesh(new THREE.SphereGeometry(SUN_R*1.75,32,32), outerGlowMat));
    sunMesh.add(new THREE.PointLight(0xffdd88, 2, 500));

    // ============ 行星 ============
    const planetMeshes = [];
    let cloudMesh;

    function makeTextSprite(text, fontSize, color) {
        const c = document.createElement('canvas'), ctx = c.getContext('2d');
        c.width = 512; c.height = 128;
        ctx.font = `bold ${fontSize}px "Noto Sans SC",sans-serif`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillStyle = color; ctx.fillText(text, 256, 64);
        const tex = new THREE.CanvasTexture(c); tex.minFilter = THREE.LinearFilter;
        const s = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true, depthWrite: false }));
        s.scale.set(20, 5, 1);
        return s;
    }

    PLANETS.forEach(p => {
        const x = p.au * AU;
        const geo = new THREE.SphereGeometry(p.r, 32, 32);
        let mesh;

        if (p.isEarth) {
            const eMat = new THREE.ShaderMaterial({
                uniforms: { dayTexture: { value: textureLoader.load(p.tex) }, sunDirection: { value: new THREE.Vector3(-1,0,0) } },
                vertexShader: `uniform vec3 sunDirection;varying vec3 vNormal,vViewDir,vSunDir;varying vec2 vUv;
                    void main(){vNormal=normalize(normalMatrix*normal);vUv=uv;vec4 mv=modelViewMatrix*vec4(position,1.);
                    vViewDir=normalize(-mv.xyz);vSunDir=normalize(mat3(viewMatrix)*sunDirection);gl_Position=projectionMatrix*mv;}`,
                fragmentShader: `uniform sampler2D dayTexture;varying vec3 vNormal,vViewDir,vSunDir;varying vec2 vUv;
                    void main(){vec3 sc=texture2D(dayTexture,vUv).rgb*1.15;sc*=max(dot(vNormal,vSunDir),0.)*.55+.45;
                    float f=pow(1.-max(dot(vNormal,vViewDir),0.),4.);gl_FragColor=vec4(mix(sc,vec3(.3,.6,1.),f*.15),1.);}`
            });
            mesh = new THREE.Mesh(geo, eMat);
            const cMat = new THREE.MeshPhongMaterial({ map: textureLoader.load('textures/earth_clouds.jpg'), transparent: true, opacity: 0.2, depthWrite: false, side: THREE.DoubleSide });
            cloudMesh = new THREE.Mesh(new THREE.SphereGeometry(p.r*1.015, 32, 32), cMat);
            mesh.add(cloudMesh);
            const atmo = new THREE.ShaderMaterial({
                vertexShader: `varying vec3 vN;void main(){vN=normalize(normalMatrix*normal);gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
                fragmentShader: `varying vec3 vN;void main(){float i=pow(.55-dot(vN,vec3(0,0,1)),3.);gl_FragColor=vec4(vec3(.3,.6,1.),i*.4);}`,
                transparent: true, blending: THREE.AdditiveBlending, side: THREE.BackSide, depthWrite: false
            });

            }

            }));

    function makeDash(x1, x2, color, opacity) {
        const g = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(x1,0,0), new THREE.Vector3(x2,0,0)]);
        const m = new THREE.LineDashedMaterial({ color, opacity, transparent: true, dashSize: 1.2, gapSize: 0.8 });

        return l;

    const DIST_CFG = [
        { key:'mercury', x:0.39*AU, r:0.25, color:'#a0a0a0', lbl:'5,850万公里（0.39 AU）', ls:[14,3.5] },

        { key:'jupiter', x:5.2*AU,  r:1.5,  color:'#c88b3a', lbl:'7.8亿公里（5.2 AU）', ls:[18,4.5] },

        { key:'uranus',  x:19.19*AU,r:0.8,  color:'#73c5d0', lbl:'28.7亿公里（19.19 AU）', ls:[20,5] },
        { key:'neptune', x:30.07*AU,r:0.7,  color:'#3f54ba', lbl:'45.1亿公里（30.07 AU）', ls:[20,5] },

    ];

        const line = makeDash(SUN_R+0.3, c.x-c.r-0.3, c.color, 0.35);

        const dl = makeTextSprite(c.lbl, 44, c.color);

    // ============ 星空粒子 ============
    const N = 2000, sP = new Float32Array(N*3), sC = new Float32Array(N*3), sS = new Float32Array(N);

        const i3=i*3, r=300+Math.random()*300, th=Math.random()*Math.PI*2, ph=Math.acos(2*Math.random()-1);
        sP[i3]=r*Math.sin(ph)*Math.cos(th); sP[i3+1]=r*Math.sin(ph)*Math.sin(th); sP[i3+2]=r*Math.cos(ph);
        const c=Math.random();
        if(c<.6){sC[i3]=1;sC[i3+1]=1;sC[i3+2]=1;}else if(c<.8){sC[i3]=.7;sC[i3+1]=.8;sC[i3+2]=1;}else{sC[i3]=1;sC[i3+1]=.95;sC[i3+2]=.8;}
        sS[i]=Math.random()*2+.5;
    }
    const sGeo = new THREE.BufferGeometry();
    sGeo.setAttribute('position', new THREE.BufferAttribute(sP,3));
    sGeo.setAttribute('color', new THREE.BufferAttribute(sC,3));
    sGeo.setAttribute('size', new THREE.BufferAttribute(sS,1));
    const sMat = new THREE.ShaderMaterial({
        uniforms: { time: { value: 0 } },
        vertexShader: `attribute float size;attribute vec3 color;varying vec3 vColor;uniform float time;
            void main(){vColor=color;vec4 mv=modelViewMatrix*vec4(position,1.);
            gl_PointSize=size*(300./-mv.z)*(sin(time*2.+position.x*.01)*.3+.7);gl_Position=projectionMatrix*mv;}`,
        fragmentShader: `varying vec3 vColor;void main(){float d=length(gl_PointCoord-.5);
            float a=1.-smoothstep(0.,.5,d);gl_FragColor=vec4(vColor,(a+exp(-d*3.)*.5)*.9);}`,
        transparent: true, blending: THREE.AdditiveBlending, depthWrite: false
    });
    scene.add(new THREE.Points(sGeo, sMat));

    // ============ 相机切换 ============
    let camTgt = null, camAnimating = false;
    window.updateScene3D = function(target) {
        const v = VIEWS[target] || VIEWS.earth;
        camTgt = { pos: v.pos, look: v.look };
        camAnimating = true;
        controls.minDistance = v.minD; controls.maxDistance = v.maxD;
        Object.keys(distObjs).forEach(k => {
            distObjs[k].line.visible = (k === target);
            distObjs[k].label.visible = (k === target);
        });
    };

    function resize() {
        const w = container.clientWidth, h = container.clientHeight;
        renderer.setSize(w, h); camera.aspect = w/h; camera.updateProjectionMatrix();
    }
    resize(); window.addEventListener('resize', resize);

    function anim3D(ts) {
        requestAnimationFrame(anim3D);
        const t = ts * 0.001;

            const s = 0.05;
            camera.position.x += (camTgt.pos[0]-camera.position.x)*s;
            camera.position.y += (camTgt.pos[1]-camera.position.y)*s;

            controls.target.z += (camTgt.look[2]-controls.target.z)*s;
            if (Math.abs(camera.position.z-camTgt.pos[2]) < 0.1) camAnimating = false;
        }
        controls.update(); renderer.render(scene, camera);
    }
    requestAnimationFrame(anim3D);
})();

const SPEED_HINTS = {
    10000: '1秒 ≈ 2.8小时，适合观看 ⚡光',
    1000000: '1秒 ≈ 11.6天，适合观看 🚀火箭',
    100000000: '1秒 ≈ 3.2年，适合观看 ✈️🚄🚗',
    1000000000: '1秒 ≈ 31.7年，所有交通工具可见',
    10000000000: '1秒 ≈ 317年，快速浏览',
};

// ============ 状态 ============
let currentTarget = 'earth';
let sunDistance = EARTH_DISTANCE;
let raceState = 'idle';
let simSeconds = 0;
let speedMul = 100_000_000;
let lastTs = null;
let rankCounter = 0;
let expandedCard = null;
const vStates = {};

const PLANET_CFG = {

    earth:  { dist: EARTH_DISTANCE, vehicles: EARTH_VEHICLES, name:'地球', intro:'地球到太阳有 1 亿 5 千万公里远！<br>坐不同的交通工具出发，要多久才能到呢？点击赛道查看旅程故事！', subtitle:'谁能最快到达太阳？', journey:'太阳之旅', footer:'⚡光比🚶步行快 2.16 亿倍！太阳真的好远好远！', defSpeed: 100_000_000 },
    mars:   { dist: MARS_DISTANCE, vehicles: MARS_VEHICLES, name:'火星', intro:'火星到太阳有 2.28 亿公里（1.52 AU）！<br>坐不同的交通工具出发，要多久才能到呢？点击赛道查看旅程故事！', subtitle:'从太阳到火星要多久？', journey:'火星之旅', footer:'⚡光到火星要 12 分 40 秒，🚶步行要 5,202 年！火星比地球远一半！', defSpeed: 100_000_000 },
    jupiter:{ dist: JUPITER_DISTANCE, vehicles: JUPITER_VEHICLES, name:'木星', intro:'木星到太阳有 7.8 亿公里（5.2 AU）！<br>坐不同的交通工具出发，要多久才能到呢？点击赛道查看旅程故事！', subtitle:'从太阳到木星要多久？', journey:'木星之旅', footer:'⚡光到木星要 43 分钟，🚶步行要 17,796 年！木星是太阳系最大的行星！', defSpeed: 1_000_000_000 },
    saturn: { dist: SATURN_DISTANCE, vehicles: SATURN_VEHICLES, name:'土星', intro:'土星到太阳有 14.3 亿公里（9.54 AU）！<br>坐不同的交通工具出发，要多久才能到呢？点击赛道查看旅程故事！', subtitle:'从太阳到土星要多久？', journey:'土星之旅', footer:'⚡光到土星要 1 小时 19 分，🚶步行要 32,649 年！土星有美丽的光环！', defSpeed: 1_000_000_000 },
    uranus: { dist: URANUS_DISTANCE, vehicles: URANUS_VEHICLES, name:'天王星', intro:'天王星到太阳有 28.7 亿公里（19.19 AU）！<br>坐不同的交通工具出发，要多久才能到呢？点击赛道查看旅程故事！', subtitle:'从太阳到天王星要多久？', journey:'天王星之旅', footer:'⚡光到天王星要 2 小时 40 分，🚶步行要 65,718 年！天王星真的超级远！', defSpeed: 1_000_000_000 },
    neptune:{ dist: NEPTUNE_DISTANCE, vehicles: NEPTUNE_VEHICLES, name:'海王星', intro:'海王星到太阳有 45.1 亿公里（30.07 AU）！<br>坐不同的交通工具出发，要多久才能到呢？点击赛道查看旅程故事！', subtitle:'从太阳到海王星要多久？', journey:'海王星之旅', footer:'⚡光到海王星要 4 小时 10 分，🚶步行要 102,911 年！海王星是最远的大行星！', defSpeed: 1_000_000_000 },
    pluto:  { dist: PLUTO_DISTANCE, vehicles: PLUTO_VEHICLES, name:'冥王星', intro:'冥王星到太阳有 59.2 亿公里（39.48 AU）！<br>坐不同的交通工具出发，要多久才能到呢？点击赛道查看旅程故事！', subtitle:'从太阳到冥王星要多久？', journey:'冥王星之旅', footer:'⚡光到冥王星要 5 小时 29 分，🚶步行要 135,126 年！冥王星是太阳系最远的成员！', defSpeed: 10_000_000_000 },
};
function getVehicles() { return PLANET_CFG[currentTarget].vehicles; }

// ============ DOM 引用 ============
const tracksEl = document.getElementById('tracks');
const timerEl = document.getElementById('timer');
const actionArea = document.getElementById('actionArea');
const finishEl = document.getElementById('finish');
const speedHintEl = document.getElementById('speedHint');

// ============ Tab 切换 ============
function switchTarget(target) {
    if (currentTarget === target) return;
    const cfg = PLANET_CFG[target];
    if (!cfg) return;
    currentTarget = target;
    sunDistance = cfg.dist;

    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.target === target));

    raceState = 'idle'; simSeconds = 0; lastTs = null; rankCounter = 0;
    timerEl.textContent = '0 秒';
    finishEl.classList.remove('show');

    tracksEl.innerHTML = '';
    expandedCard = null;
    Object.keys(vStates).forEach(k => delete vStates[k]);
    cfg.vehicles.forEach(v => {
        vStates[v.id] = { arrived: false, rank: 0 };
        buildTrack(v);
    });
    showIdleBtns();

    document.getElementById('introText').innerHTML = cfg.intro;
    document.getElementById('subtitleText').textContent = cfg.subtitle;
    document.getElementById('exploreLink').style.display = (target === 'earth') ? '' : 'none';

    speedMul = cfg.defSpeed;
    document.querySelectorAll('.speed-btn').forEach(b => b.classList.toggle('active', parseInt(b.dataset.speed) === cfg.defSpeed));
    speedHintEl.textContent = SPEED_HINTS[cfg.defSpeed] || '';

    if (window.updateScene3D) window.updateScene3D(target);
}

// ============ 初始化 ============
function init() {
    getVehicles().forEach(v => {
        vStates[v.id] = { arrived: false, rank: 0 };
        buildTrack(v);
    });
    setupSpeedBtns();
    document.getElementById('startBtn').addEventListener('click', startRace);
    createStars();
}

function buildTrack(v) {
    const el = document.createElement('div');
    el.className = 'track';
    el.dataset.id = v.id;
    el.style.setProperty('--tc', v.color);

    const totalTime = formatTime(sunDistance / v.speedKmH * 3600);
    const journeyName = PLANET_CFG[currentTarget].journey;

    el.innerHTML = `
        <div class="track-main">
            <div class="track-info">
                <span class="track-icon">${v.icon}</span>
                <div>
                    <div class="track-name">${v.name}</div>
                    <div class="track-speed">${v.speedDisplay}</div>
                </div>
            </div>
            <div class="track-bar-wrap">
                <div class="track-bar-fill" data-fill style="background:${v.color};width:0%"></div>
            </div>
            <div class="track-status" data-status>${totalTime}</div>
        </div>
        <div class="arrival-banner" data-banner>${v.arrivalMsg}</div>
        <div class="journey-card" data-card>
            <div class="journey-inner">
                <div class="journey-title">${v.icon} ${v.name}的${journeyName}（${v.speedDisplay}）</div>
                ${v.milestones.map(m => `
                    <div class="milestone">
                        <div class="milestone-time">${m.time}</div>
                        <div class="milestone-body">
                            <div class="milestone-label">📍 ${m.label}（${m.dist}）</div>
                            <div class="milestone-fun">${m.fun}</div>
                        </div>
                    </div>
                `).join('')}
                <div class="journey-fact">💡 ${v.funFact}</div>
            </div>
        </div>
    `;

    el.addEventListener('click', (e) => {
        if (e.target.closest('.speed-btn') || e.target.closest('.btn-primary') || e.target.closest('.btn-secondary')) return;
        toggleCard(v.id, el);
    });

    tracksEl.appendChild(el);
    vStates[v.id].el = el;
}

function toggleCard(id, el) {
    const card = el.querySelector('[data-card]');
    if (expandedCard === id) {
        card.classList.remove('expanded');
        expandedCard = null;
    } else {
        if (expandedCard) {
            const prev = document.querySelector(`.track[data-id="${expandedCard}"] [data-card]`);
            if (prev) prev.classList.remove('expanded');
        }
        card.classList.add('expanded');
        expandedCard = id;
    }
}

// ============ 速度按钮 ============
function setupSpeedBtns() {
    document.querySelectorAll('.speed-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            speedMul = parseInt(btn.dataset.speed);
            speedHintEl.textContent = SPEED_HINTS[speedMul] || '';
        });
    });
}

// ============ 比赛控制 ============
function startRace() {
    raceState = 'running';
    lastTs = null;
    document.querySelectorAll('[data-fill]').forEach(f => f.classList.add('animate'));
    showRunningBtns();
    requestAnimationFrame(animate);
}

function pauseRace() { raceState = 'paused'; showPausedBtns(); }

function resumeRace() {
    raceState = 'running'; lastTs = null;
    showRunningBtns(); requestAnimationFrame(animate);
}

function resetRace() {
    raceState = 'idle'; simSeconds = 0; lastTs = null; rankCounter = 0;
    getVehicles().forEach(v => {
        const s = vStates[v.id];
        if (!s || !s.el) return;
        s.arrived = false; s.rank = 0;
        s.el.classList.remove('arrived');
        s.el.querySelector('[data-fill]').style.width = '0%';
        s.el.querySelector('[data-fill]').classList.remove('animate');
        s.el.querySelector('[data-status]').textContent = formatTime(sunDistance / v.speedKmH * 3600);
        s.el.querySelector('[data-status]').classList.remove('done');
        s.el.querySelector('[data-banner]').classList.remove('show');
    });
    timerEl.textContent = '0 秒';
    finishEl.classList.remove('show');
    showIdleBtns();
}

// ============ 按钮切换 ============
function showIdleBtns() { actionArea.innerHTML = '<button class="btn-primary pulse" onclick="startRace()">🏁 出发！</button>'; }
function showRunningBtns() {
    actionArea.innerHTML = '<button class="btn-secondary" onclick="pauseRace()">⏸️ 暂停</button> <button class="btn-secondary" onclick="resetRace()">🔄 重来</button>';
}
function showPausedBtns() {
    actionArea.innerHTML = '<button class="btn-secondary" onclick="resumeRace()">▶️ 继续</button> <button class="btn-secondary" onclick="resetRace()">🔄 重来</button>';
}
function showFinishedBtns() { actionArea.innerHTML = '<button class="btn-primary" onclick="resetRace()">🔄 再来一次！</button>'; }

// ============ 动画引擎 ============
function animate(ts) {
    if (raceState !== 'running') return;
    if (lastTs === null) lastTs = ts;
    const dt = Math.min(ts - lastTs, 100);
    lastTs = ts;
    simSeconds += (dt / 1000) * speedMul;

    let allDone = true;
    const vehicles = getVehicles();

    vehicles.forEach(v => {
        const s = vStates[v.id];
        if (s.arrived) return;
        const dist = v.speedKmH * (simSeconds / 3600);
        const progress = Math.min(1, dist / sunDistance);
        s.el.querySelector('[data-fill]').style.width = (progress * 100) + '%';
        if (progress >= 1) {
            s.arrived = true; rankCounter++; s.rank = rankCounter;
            onArrived(v, s);
        } else { allDone = false; }
    });

    if (allDone) { vehicles.forEach(v => { if (!vStates[v.id].arrived) allDone = false; }); }
    timerEl.textContent = formatTime(simSeconds);

    if (allDone) { raceState = 'finished'; onAllDone(); }
    else { requestAnimationFrame(animate); }
}

function onArrived(v, s) {
    s.el.classList.add('arrived');
    const statusEl = s.el.querySelector('[data-status]');
    const medals = ['🥇','🥈','🥉','4️⃣','5️⃣','6️⃣','7️⃣'];
    statusEl.textContent = `${medals[s.rank-1]} 第${s.rank}名`;
    statusEl.classList.add('done');
    s.el.querySelector('[data-banner]').classList.add('show');
}

function onAllDone() {
    showFinishedBtns();
    const vehicles = getVehicles();
    const sorted = vehicles.slice().sort((a, b) => vStates[a.id].rank - vStates[b.id].rank);
    const medals = ['🥇','🥈','🥉'];
    let html = '';
    sorted.forEach((v, i) => {
        const medal = i < 3 ? medals[i] : `${i+1}.`;
        html += `<div>${medal} ${v.icon} ${v.name} — ${formatTime(sunDistance / v.speedKmH * 3600)}</div>`;
    });
    document.getElementById('finishRanks').innerHTML = html;
    document.getElementById('finishFooter').textContent = PLANET_CFG[currentTarget].footer;
    finishEl.classList.add('show');
}

// ============ 时间格式化 ============
function formatTime(seconds) {
    if (seconds < 1) return '不到1秒';
    if (seconds < 60) return Math.floor(seconds) + '秒';
    if (seconds < 3600) {
        const m = Math.floor(seconds / 60), s = Math.floor(seconds % 60);
        return s > 0 ? `${m}分${s}秒` : `${m}分钟`;
    }
    if (seconds < 86400) {
        const h = Math.floor(seconds / 3600), m = Math.floor((seconds % 3600) / 60);
        return m > 0 ? `${h}小时${m}分` : `${h}小时`;
    }
    const days = seconds / 86400;
    if (days < 30) return Math.floor(days) + '天';
    if (days < 365.25) return Math.floor(days / 30.44) + '个月';
    const years = seconds / (86400 * 365.25);
    if (years < 10) return years.toFixed(1) + '年';
    if (years < 1000) return Math.round(years) + '年';
    return Math.round(years).toLocaleString() + '年';
}

// ============ 星空背景 ============
function createStars() {
    const el = document.getElementById('stars');
    for (let i = 0; i < 100; i++) {
        const s = document.createElement('div'); s.className = 'star';
        const size = Math.random() * 2.5 + 0.5;
        s.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;top:${Math.random()*100}%;animation-delay:${Math.random()*3}s;animation-duration:${2+Math.random()*3}s;`;
        el.appendChild(s);
    }
}

// ============ 启动 ============
init();
</script>
