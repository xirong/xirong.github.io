<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地球的奥秘 - 柳智天的宇宙课堂</title>
    <link rel="preconnect" href="https://fonts.loli.net">
    <link rel="preconnect" href="https://fonts.loli.net" crossorigin>
    <link
        href="https://fonts.loli.net/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Orbitron:wght@400;500;700;900&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --cosmic-dark: #0a0a0f;
            --nebula-purple: #1a0a2e;
            --stellar-blue: #16213e;
            --accent-gold: #f4d03f;
            --accent-orange: #e67e22;
            --accent-cyan: #00d4ff;
            --accent-green: #2ecc71;
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--cosmic-dark);
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* 顶部标题栏 */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(180deg, rgba(10, 10, 15, 0.9) 0%, transparent 100%);
            pointer-events: none;
        }

        .header>* {
            pointer-events: auto;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #6b93d6, #3d6b3d);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 0 30px rgba(107, 147, 214, 0.4);
            animation: earth-glow 3s ease-in-out infinite;
        }

        @keyframes earth-glow {

            0%,
            100% {
                box-shadow: 0 0 30px rgba(107, 147, 214, 0.4);
            }

            50% {
                box-shadow: 0 0 50px rgba(107, 147, 214, 0.7);
            }
        }

        .logo-text h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(90deg, #6b93d6, var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
        }

        .logo-text p {
            font-size: 0.85rem;
            color: var(--text-secondary);
            letter-spacing: 1px;
        }

        /* 返回按钮 */
        .back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            color: var(--text-primary);
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent-cyan);
            transform: translateX(-5px);
        }

        /* 演示模式选择器 */
        .mode-selector {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: flex;
            gap: 10px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            padding: 12px 20px;
            border-radius: 50px;
        }

        .mode-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid transparent;
            border-radius: 30px;
            color: var(--text-primary);
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .mode-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .mode-btn.active {
            border-color: var(--accent-cyan);
            background: rgba(0, 212, 255, 0.15);
        }

        .mode-btn .icon {
            font-size: 1.3rem;
        }

        /* 信息面板 - 默认收起，悬停展开 */
        .info-panel {
            position: fixed;
            top: 100px;
            right: 0;
            z-index: 100;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-right: none;
            backdrop-filter: blur(30px);
            border-radius: 20px 0 0 20px;
            padding: 25px;
            width: 320px;
            max-height: calc(100vh - 200px);
            overflow-y: auto;
            transform: translateX(calc(100% - 45px));
            transition: transform 0.3s ease;
        }

        .info-panel:hover {
            transform: translateX(0);
        }

        .info-panel::before {
            content: '📖';
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.2rem;
            opacity: 0.8;
            transition: opacity 0.3s ease;
        }

        .info-panel:hover::before {
            opacity: 0;
        }

        .info-panel-content {
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .info-panel:hover .info-panel-content {
            opacity: 1;
        }

        .info-panel h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--accent-cyan);
        }

        .info-panel h2 .icon {
            font-size: 1.5rem;
        }

        .info-content {
            font-size: 0.9rem;
            line-height: 1.8;
            color: var(--text-secondary);
        }

        .info-content p {
            margin-bottom: 12px;
        }

        .info-content .highlight {
            color: var(--accent-gold);
            font-weight: 500;
        }

        .info-content .fun-fact {
            background: rgba(244, 208, 63, 0.1);
            border-left: 3px solid var(--accent-gold);
            padding: 12px 15px;
            margin: 15px 0;
            border-radius: 0 10px 10px 0;
        }

        .info-content .fun-fact-title {
            color: var(--accent-gold);
            font-weight: 600;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* 速度控制 */
        .speed-control {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 100;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            padding: 15px 20px;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .play-pause-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 20px;
            background: linear-gradient(135deg, var(--accent-cyan), #0099cc);
            border: none;
            border-radius: 25px;
            color: white;
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.3);
        }

        .play-pause-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0, 212, 255, 0.5);
        }

        .play-pause-btn .icon {
            font-size: 1.1rem;
        }

        .speed-section {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .speed-control label {
            display: block;
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .speed-slider {
            width: 120px;
            height: 6px;
            -webkit-appearance: none;
            appearance: none;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            outline: none;
        }

        .speed-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: var(--accent-cyan);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px var(--accent-cyan);
        }

        .speed-value {
            text-align: center;
            margin-top: 5px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            color: var(--accent-cyan);
        }

        /* 时间显示 */
        .time-display {
            position: fixed;
            top: 100px;
            left: 30px;
            z-index: 100;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }

        .time-display .label {
            font-size: 0.7rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .time-display .value {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            color: var(--accent-gold);
        }

        .time-display .sub-value {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 5px;
        }

        /* 加载动画 */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--cosmic-dark);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease;
        }

        .loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-earth {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #6b93d6 60%, #3d6b3d 40%);
            border-radius: 50%;
            animation: earth-spin 3s linear infinite;
            box-shadow: 0 0 40px rgba(107, 147, 214, 0.5);
        }

        @keyframes earth-spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .loading-text {
            margin-top: 30px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            letter-spacing: 2px;
            color: var(--accent-cyan);
        }

        /* 轴倾斜指示器 */
        .axis-indicator {
            position: fixed;
            left: 30px;
            bottom: 30px;
            z-index: 100;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            padding: 15px 20px;
            border-radius: 15px;
            display: none;
        }

        .axis-indicator.visible {
            display: block;
        }

        .axis-indicator .title {
            font-size: 0.7rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .axis-indicator .angle {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            color: var(--accent-orange);
        }

        .axis-indicator .desc {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 5px;
        }

        /* 日食进度面板 */
        .eclipse-progress-panel {
            position: fixed;
            left: 30px;
            bottom: 30px;
            z-index: 100;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            padding: 15px 20px;
            border-radius: 15px;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            min-width: 160px;
        }

        .eclipse-progress-panel.visible {
            display: flex;
        }

        .eclipse-progress-panel .title {
            font-size: 0.7rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .eclipse-progress-panel .phase-label {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85rem;
            color: var(--accent-gold);
            text-align: center;
        }

        .eclipse-progress-panel .speed-slider {
            width: 120px;
        }
    </style>
</head>

<body>
    <!-- 加载动画 -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-earth"></div>
        <div class="loading-text">正在加载地球...</div>
    </div>

    <!-- 3D 画布容器 -->
    <div id="canvas-container"></div>

    <!-- 顶部标题 -->
    <div class="header">
        <div class="logo">
            <div class="logo-icon">🌍</div>
            <div class="logo-text">
                <h1>EARTH</h1>
                <p>地球的奥秘 - 柳智天的宇宙课堂</p>
            </div>
        </div>
        <a href="solar-system.html" class="back-btn">
            <span>←</span>
            <span>返回太阳系</span>
        </a>
    </div>

    <!-- 时间显示 -->
    <div class="time-display" id="timeDisplay">
        <div class="label">地球时间</div>
        <div class="value" id="dayCount">第 1 天</div>
        <div class="sub-value" id="yearProgress">公转进度: 0%</div>
    </div>

    <!-- 演示模式选择器 -->
    <div class="mode-selector">
        <button class="mode-btn active" data-mode="rotation" title="观察地球自转">
            <span class="icon">🔄</span>
            <span>自转</span>
        </button>
        <button class="mode-btn" data-mode="revolution" title="观察地球公转">
            <span class="icon">🌍</span>
            <span>公转</span>
        </button>
        <button class="mode-btn" data-mode="structure" title="地球内部结构">
            <span class="icon">🌋</span>
            <span>内部结构</span>
        </button>
        <button class="mode-btn" data-mode="eclipse" title="观察日食过程">
            <span class="icon">🌑</span>
            <span>日食</span>
        </button>
    </div>

    <!-- 轴倾斜指示器 -->
    <div class="axis-indicator" id="axisIndicator">
        <div class="title">地轴倾斜角度</div>
        <div class="angle">23.5°</div>
        <div class="desc">这就是四季产生的原因！</div>
    </div>

    <!-- 日食进度控制 -->
    <div class="eclipse-progress-panel" id="eclipseProgressPanel">
        <div class="title">日食进度</div>
        <div class="phase-label" id="eclipsePhaseLabel">初始</div>
        <input type="range" class="speed-slider" id="eclipseSlider" min="0" max="100" step="0.1" value="0">
        <div class="speed-value" id="eclipseProgressValue">0%</div>
    </div>

    <!-- 速度控制 -->
    <div class="speed-control">
        <button class="play-pause-btn" id="playPauseBtn">
            <span class="icon">⏸️</span>
            <span>暂停</span>
        </button>
        <div class="speed-section">
            <label>演示速度</label>
            <input type="range" class="speed-slider" id="speedSlider" min="0.1" max="5" step="0.1" value="0.5">
            <div class="speed-value" id="speedValue">0.5x</div>
        </div>
    </div>

    <!-- 信息面板 -->
    <div class="info-panel" id="infoPanel">
        <div class="info-panel-content">
            <h2><span class="icon">🔄</span>地球自转</h2>
            <div class="info-content" id="infoContent">
                <p>地球像一个<span class="highlight">旋转的陀螺</span>，每天都在不停地转动！</p>
                <p>地球自转一圈需要<span class="highlight">24小时</span>，这就是我们一天的时间。</p>
                <p>当我们这边面对太阳时，就是<span class="highlight">白天</span>；背对太阳时，就是<span class="highlight">黑夜</span>。</p>
                <div class="fun-fact">
                    <div class="fun-fact-title">🤔 智天，你知道吗？</div>
                    <p>地球自转的速度非常快！在赤道上，地球表面的移动速度达到每小时1670公里，比飞机还快呢！</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="earth.js"></script>
</body>

</html>
