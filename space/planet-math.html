<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星球加减法 - 柳智天的宇宙课堂</title>
    <link rel="preconnect" href="https://fonts.loli.net">
    <link rel="preconnect" href="https://fonts.loli.net" crossorigin>
    <link href="https://fonts.loli.net/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: #0a0a1a;
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 星空背景 */
        .starfield {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            animation: twinkle var(--dur) ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: var(--o1); }
            50% { opacity: var(--o2); }
        }

        /* 顶部 */
        .header {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 24px 20px 8px;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 900;
            background: linear-gradient(135deg, #ffd700, #ff6b35, #ff1493, #00d4ff);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradient-shift 4s ease infinite;
        }

        @keyframes gradient-shift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 模式切换 + 得分 */
        .top-bar {
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            padding: 12px 20px;
            flex-wrap: wrap;
        }

        .mode-tabs {
            display: flex;
            gap: 4px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 30px;
            padding: 4px;
        }

        .mode-tab {
            padding: 8px 20px;
            border-radius: 26px;
            border: none;
            background: transparent;
            color: rgba(255, 255, 255, 0.5);
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .mode-tab.active {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
        }

        .mode-tab:hover:not(.active) {
            color: rgba(255, 255, 255, 0.8);
        }

        .score-display {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.6);
        }

        .score-num {
            font-weight: 700;
            font-size: 1.2rem;
            color: #ffd700;
            min-width: 20px;
            text-align: center;
        }

        .streak {
            display: flex;
            gap: 3px;
            margin-left: 4px;
        }

        .streak-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.12);
            transition: all 0.3s ease;
        }

        .streak-dot.filled {
            background: #ffd700;
            box-shadow: 0 0 6px rgba(255, 215, 0, 0.5);
        }

        /* 算式 */
        .equation {
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 16px 20px;
            margin: 0 auto;
            max-width: 520px;
        }

        .eq-num {
            font-size: 4rem;
            font-weight: 900;
            min-width: 60px;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .eq-num.a-num { color: #4fc3f7; }
        .eq-num.b-num { color: #ff8a65; }

        .eq-answer {
            font-size: 4rem;
            font-weight: 900;
            min-width: 60px;
            text-align: center;
            color: #66bb6a;
            position: relative;
        }

        .eq-answer.empty {
            color: transparent;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            min-width: 64px;
            min-height: 60px;
            border: 3px dashed rgba(102, 187, 106, 0.4);
            animation: pulse-border 2s ease-in-out infinite;
        }

        @keyframes pulse-border {
            0%, 100% { border-color: rgba(102, 187, 106, 0.3); }
            50% { border-color: rgba(102, 187, 106, 0.7); }
        }

        .eq-answer.correct {
            color: #66bb6a;
            text-shadow: 0 0 20px rgba(102, 187, 106, 0.6);
        }

        .eq-answer.wrong {
            animation: shake 0.4s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-6px); }
            80% { transform: translateX(6px); }
        }

        .eq-op {
            font-size: 2.5rem;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.5);
        }

        .eq-op.op-main {
            color: rgba(255, 255, 255, 0.7);
        }

        .eq-num.pop, .eq-answer.pop {
            animation: pop 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes pop {
            0% { transform: scale(1); }
            40% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }

        /* 星球展示区 */
        .playground {
            position: relative;
            z-index: 10;
            display: flex;
            gap: 16px;
            padding: 8px 30px 12px;
            max-width: 1000px;
            margin: 0 auto;
            min-height: 200px;
        }

        .zone {
            flex: 1;
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 16px;
            min-height: 180px;
            display: flex;
            flex-wrap: wrap;
            align-content: flex-start;
            gap: 10px;
            justify-content: center;
            position: relative;
            transition: all 0.5s ease;
        }

        .zone.left-zone { border-color: rgba(79, 195, 247, 0.2); }
        .zone.right-zone { border-color: rgba(255, 138, 101, 0.2); }

        /* 减法模式右侧区域样式 */
        .zone.right-zone.subtract-zone {
            border-color: rgba(255, 82, 82, 0.25);
            background: rgba(255, 82, 82, 0.03);
        }

        .zone-label {
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.2);
            letter-spacing: 2px;
        }

        .zone-label.left { color: rgba(79, 195, 247, 0.35); }
        .zone-label.right { color: rgba(255, 138, 101, 0.35); }

        /* 星球 */
        .planet {
            width: 70px;
            height: 88px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .planet.enter {
            animation: planet-enter 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes planet-enter {
            from { opacity: 0; transform: scale(0.3) translateY(-20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .planet-ball {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            position: relative;
            box-shadow: 0 0 15px var(--glow);
        }

        /* 土星环 */
        .planet-ball.saturn-ring::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 72px;
            height: 18px;
            border: 3px solid rgba(210, 180, 140, 0.6);
            border-radius: 50%;
            transform: translate(-50%, -50%) rotateX(70deg);
            pointer-events: none;
        }

        .planet-name {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.6);
            text-align: center;
            white-space: nowrap;
        }

        /* 减法模式被拿走的星球 */
        .planet.taken-away {
            opacity: 0.35;
        }

        .planet.taken-away .planet-ball::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 140%;
            height: 3px;
            background: rgba(255, 82, 82, 0.7);
            transform: translate(-50%, -50%) rotate(-45deg);
            border-radius: 2px;
        }

        /* 数字键盘 */
        .numpad {
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 12px 20px;
            flex-wrap: wrap;
            max-width: 600px;
            margin: 0 auto;
        }

        .num-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.12);
            background: rgba(255, 255, 255, 0.04);
            color: rgba(255, 255, 255, 0.8);
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 1.3rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .num-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.3);
            transform: scale(1.1);
        }

        .num-btn:active {
            transform: scale(0.95);
        }

        .num-btn.correct-flash {
            background: rgba(102, 187, 106, 0.3) !important;
            border-color: #66bb6a !important;
            color: #66bb6a !important;
        }

        .num-btn.wrong-flash {
            background: rgba(255, 82, 82, 0.3) !important;
            border-color: #ff5252 !important;
            color: #ff5252 !important;
        }

        /* 操作栏 */
        .actions {
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: center;
            gap: 12px;
            padding: 12px 20px;
        }

        .action-btn {
            padding: 10px 24px;
            border-radius: 50px;
            border: 2px solid rgba(255, 255, 255, 0.12);
            background: rgba(255, 255, 255, 0.04);
            color: rgba(255, 255, 255, 0.7);
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .action-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
        }

        .action-btn:active {
            transform: translateY(0);
        }

        .action-btn.primary {
            background: rgba(102, 187, 106, 0.15);
            border-color: rgba(102, 187, 106, 0.4);
            color: #a5d6a7;
        }

        .action-btn.primary:hover {
            background: rgba(102, 187, 106, 0.25);
            border-color: rgba(102, 187, 106, 0.6);
        }

        /* 反馈提示 */
        .feedback {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            z-index: 9999;
            font-size: 4rem;
            pointer-events: none;
            transition: none;
        }

        .feedback.show {
            animation: feedback-pop 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes feedback-pop {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; }
        }

        /* 庆祝彩纸 */
        .confetti {
            position: fixed;
            top: -10px;
            border-radius: 2px;
            z-index: 9998;
            pointer-events: none;
            animation: confetti-fall var(--fall-dur) linear forwards;
        }

        @keyframes confetti-fall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        /* 返回 */
        .back-btn {
            position: fixed;
            left: 20px;
            bottom: 20px;
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 0.85rem;
            padding: 8px 16px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            z-index: 1000;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
        }

        /* 响应式 */
        @media (max-width: 700px) {
            .header h1 { font-size: 1.5rem; }
            .eq-num, .eq-answer { font-size: 3rem; min-width: 48px; }
            .eq-answer.empty { min-width: 52px; min-height: 48px; }
            .eq-op { font-size: 2rem; }

            .playground {
                flex-direction: column;
                padding: 8px 15px;
                min-height: auto;
            }

            .zone { min-height: 120px; padding: 12px; }

            .planet { width: 60px; height: 78px; }
            .planet-ball { width: 42px; height: 42px; }
            .planet-ball.saturn-ring::after { width: 60px; height: 14px; }

            .num-btn { width: 44px; height: 44px; font-size: 1.1rem; }
        }
    </style>
</head>

<body>
    <div class="starfield" id="starfield"></div>

    <div class="header">
        <h1>星球加减法</h1>
    </div>

    <!-- 模式 + 得分 -->
    <div class="top-bar">
        <div class="mode-tabs">
            <button class="mode-tab active" data-mode="add">加法</button>
            <button class="mode-tab" data-mode="sub">减法</button>
            <button class="mode-tab" data-mode="mix">混合</button>
        </div>
        <div class="score-display">
            <span class="score-num" id="scoreNum">0</span>
            <div class="streak" id="streak">
                <div class="streak-dot"></div>
                <div class="streak-dot"></div>
                <div class="streak-dot"></div>
                <div class="streak-dot"></div>
                <div class="streak-dot"></div>
            </div>
        </div>
    </div>

    <!-- 算式 -->
    <div class="equation" id="equation">
        <span class="eq-num a-num" id="aNum">0</span>
        <span class="eq-op op-main" id="opSign">+</span>
        <span class="eq-num b-num" id="bNum">0</span>
        <span class="eq-op">=</span>
        <span class="eq-answer empty" id="answerEl">?</span>
    </div>

    <!-- 星球展示 -->
    <div class="playground">
        <div class="zone left-zone" id="leftZone">
            <span class="zone-label left" id="leftLabel">左边</span>
        </div>
        <div class="zone right-zone" id="rightZone">
            <span class="zone-label right" id="rightLabel">右边</span>
        </div>
    </div>

    <!-- 数字键盘 -->
    <div class="numpad" id="numpad"></div>

    <!-- 操作 -->
    <div class="actions">
        <button class="action-btn primary" id="nextBtn">下一题</button>
    </div>

    <!-- 反馈表情 -->
    <div class="feedback" id="feedback"></div>

    <a href="solar-system.html" class="back-btn">🪐 太阳系</a>

    <script>
        // ========== 数据 ==========
        const PLANETS = [
            { id: 'sun',     name: '太阳',   bg: 'radial-gradient(circle at 35% 35%, #fffde7, #ffeb3b, #ff9800, #e65100)', glow: 'rgba(255,193,7,0.6)' },
            { id: 'mercury', name: '水星',   bg: 'radial-gradient(circle at 35% 35%, #e0e0e0, #9e9e9e, #616161)',           glow: 'rgba(158,158,158,0.5)' },
            { id: 'venus',   name: '金星',   bg: 'radial-gradient(circle at 35% 35%, #fff8e1, #ffe082, #f9a825)',           glow: 'rgba(249,168,37,0.5)' },
            { id: 'earth',   name: '地球',   bg: 'radial-gradient(circle at 35% 35%, #e3f2fd, #42a5f5, #1565c0, #2e7d32)', glow: 'rgba(66,165,245,0.5)' },
            { id: 'mars',    name: '火星',   bg: 'radial-gradient(circle at 35% 35%, #ffccbc, #e64a19, #bf360c)',           glow: 'rgba(230,74,25,0.5)' },
            { id: 'jupiter', name: '木星',   bg: 'radial-gradient(circle at 35% 35%, #fff3e0, #d7ccc8, #bcaaa4, #a1887f)', glow: 'rgba(188,170,164,0.5)' },
            { id: 'saturn',  name: '土星',   bg: 'radial-gradient(circle at 35% 35%, #fff8e1, #ffe0b2, #d2b48c)',           glow: 'rgba(210,180,140,0.5)', ring: true },
            { id: 'uranus',  name: '天王星', bg: 'radial-gradient(circle at 35% 35%, #e0f7fa, #80deea, #00acc1)',           glow: 'rgba(0,172,193,0.5)' },
            { id: 'neptune', name: '海王星', bg: 'radial-gradient(circle at 35% 35%, #e8eaf6, #5c6bc0, #283593)',           glow: 'rgba(92,107,192,0.5)' },
            { id: 'pluto',   name: '冥王星', bg: 'radial-gradient(circle at 35% 35%, #efebe9, #a1887f, #6d4c41)',           glow: 'rgba(109,76,65,0.5)' },
        ];

        // ========== DOM ==========
        const leftZone = document.getElementById('leftZone');
        const rightZone = document.getElementById('rightZone');
        const leftLabel = document.getElementById('leftLabel');
        const rightLabel = document.getElementById('rightLabel');
        const aNumEl = document.getElementById('aNum');
        const bNumEl = document.getElementById('bNum');
        const opSign = document.getElementById('opSign');
        const answerEl = document.getElementById('answerEl');
        const feedbackEl = document.getElementById('feedback');
        const scoreNumEl = document.getElementById('scoreNum');
        const streakEl = document.getElementById('streak');
        const numpad = document.getElementById('numpad');

        // ========== 状态 ==========
        let mode = 'add'; // add / sub / mix
        let currentA = 0;
        let currentB = 0;
        let currentOp = '+';
        let correctAnswer = 0;
        let answered = false;
        let score = 0;
        let streakCount = 0;

        // ========== 星空 ==========
        (function() {
            const field = document.getElementById('starfield');
            for (let i = 0; i < 100; i++) {
                const s = document.createElement('div');
                s.className = 'star';
                const size = Math.random() * 2 + 1;
                s.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;top:${Math.random()*100}%`;
                s.style.setProperty('--dur', (2 + Math.random() * 4) + 's');
                s.style.setProperty('--o1', (0.2 + Math.random() * 0.3).toFixed(2));
                s.style.setProperty('--o2', (0.6 + Math.random() * 0.4).toFixed(2));
                s.style.animationDelay = (Math.random() * 4) + 's';
                field.appendChild(s);
            }
        })();

        // ========== 数字键盘 ==========
        for (let i = 0; i <= 10; i++) {
            const btn = document.createElement('button');
            btn.className = 'num-btn';
            btn.textContent = i;
            btn.dataset.val = i;
            btn.addEventListener('click', () => submitAnswer(i));
            numpad.appendChild(btn);
        }

        // ========== 模式切换 ==========
        document.querySelectorAll('.mode-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                mode = tab.dataset.mode;
                newQuestion();
            });
        });

        // ========== 下一题 ==========
        document.getElementById('nextBtn').addEventListener('click', newQuestion);

        // ========== 生成题目 ==========
        function newQuestion() {
            answered = false;
            answerEl.textContent = '?';
            answerEl.className = 'eq-answer empty';

            // 清除键盘高亮
            numpad.querySelectorAll('.num-btn').forEach(b => {
                b.classList.remove('correct-flash', 'wrong-flash');
            });

            // 决定加还是减
            if (mode === 'mix') {
                currentOp = Math.random() < 0.5 ? '+' : '-';
            } else {
                currentOp = mode === 'add' ? '+' : '-';
            }

            if (currentOp === '+') {
                // 加法: a + b, 总和 2~10
                const sum = 2 + Math.floor(Math.random() * 9); // 2~10
                currentA = 1 + Math.floor(Math.random() * (sum - 1)); // 1 ~ sum-1
                currentB = sum - currentA;
                correctAnswer = sum;
            } else {
                // 减法: a - b, a: 2~10, b: 1~a-1 (确保结果 ≥ 1)
                currentA = 2 + Math.floor(Math.random() * 9); // 2~10
                currentB = 1 + Math.floor(Math.random() * (currentA - 1)); // 1 ~ a-1
                correctAnswer = currentA - currentB;
            }

            opSign.textContent = currentOp;
            aNumEl.textContent = currentA;
            bNumEl.textContent = currentB;

            // 布局星球
            layoutPlanets();
        }

        // ========== 布局星球 ==========
        function layoutPlanets() {
            // 清空
            leftZone.querySelectorAll('.planet').forEach(p => p.remove());
            rightZone.querySelectorAll('.planet').forEach(p => p.remove());

            // 随机打乱星球顺序
            const shuffled = [...PLANETS];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }

            if (currentOp === '+') {
                // 加法：左边放 a 个，右边放 b 个
                for (let i = 0; i < currentA; i++) {
                    addPlanet(leftZone, shuffled[i], i * 60);
                }
                for (let i = 0; i < currentB; i++) {
                    addPlanet(rightZone, shuffled[currentA + i], (currentA + i) * 60);
                }
                leftLabel.textContent = '左边';
                rightLabel.textContent = '右边';
                rightZone.classList.remove('subtract-zone');
            } else {
                // 减法：左边放 a 个（全部），右边放 b 个（被拿走的，带划线）
                for (let i = 0; i < currentA - currentB; i++) {
                    addPlanet(leftZone, shuffled[i], i * 60);
                }
                for (let i = 0; i < currentB; i++) {
                    addPlanet(rightZone, shuffled[currentA - currentB + i], (currentA - currentB + i) * 60, true);
                }
                leftLabel.textContent = '剩下的';
                rightLabel.textContent = '拿走的';
                rightZone.classList.add('subtract-zone');
            }
        }

        function addPlanet(zone, data, delay, takenAway) {
            const el = document.createElement('div');
            el.className = 'planet enter' + (takenAway ? ' taken-away' : '');
            el.style.animationDelay = delay + 'ms';

            const ball = document.createElement('div');
            ball.className = 'planet-ball' + (data.ring ? ' saturn-ring' : '');
            ball.style.background = data.bg;
            ball.style.setProperty('--glow', data.glow);

            const name = document.createElement('div');
            name.className = 'planet-name';
            name.textContent = data.name;

            el.appendChild(ball);
            el.appendChild(name);
            zone.insertBefore(el, zone.querySelector('.zone-label'));
        }

        // ========== 提交答案 ==========
        function submitAnswer(num) {
            if (answered) return;

            const btn = numpad.querySelector(`[data-val="${num}"]`);

            if (num === correctAnswer) {
                // 正确
                answered = true;
                score++;
                streakCount = Math.min(streakCount + 1, 5);

                scoreNumEl.textContent = score;
                updateStreak();

                answerEl.textContent = num;
                answerEl.className = 'eq-answer correct pop';
                btn.classList.add('correct-flash');

                showFeedback(pickEmoji('correct'));
                if (streakCount >= 3) celebrate();

                // 1.5秒后自动下一题
                setTimeout(newQuestion, 1500);
            } else {
                // 错误
                streakCount = 0;
                updateStreak();

                answerEl.textContent = num;
                answerEl.className = 'eq-answer wrong';
                btn.classList.add('wrong-flash');

                showFeedback(pickEmoji('wrong'));

                // 震完后清除，让孩子再试
                setTimeout(() => {
                    answerEl.textContent = '?';
                    answerEl.className = 'eq-answer empty';
                    btn.classList.remove('wrong-flash');
                }, 600);
            }
        }

        // ========== UI 工具 ==========
        function updateStreak() {
            const dots = streakEl.querySelectorAll('.streak-dot');
            dots.forEach((d, i) => d.classList.toggle('filled', i < streakCount));
        }

        function showFeedback(emoji) {
            feedbackEl.textContent = emoji;
            feedbackEl.className = 'feedback';
            void feedbackEl.offsetWidth;
            feedbackEl.className = 'feedback show';
        }

        function pickEmoji(type) {
            const correct = ['🎉', '⭐', '🚀', '👏', '💫', '🌟', '✨', '👍'];
            const wrong = ['🤔', '💪', '🧐', '😊'];
            const list = type === 'correct' ? correct : wrong;
            return list[Math.floor(Math.random() * list.length)];
        }

        function celebrate() {
            const colors = ['#ffd700', '#ff6b35', '#ff1493', '#00d4ff', '#66bb6a', '#ab47bc'];
            for (let i = 0; i < 25; i++) {
                const c = document.createElement('div');
                c.className = 'confetti';
                c.style.left = Math.random() * 100 + 'vw';
                c.style.background = colors[Math.floor(Math.random() * colors.length)];
                c.style.setProperty('--fall-dur', (1.5 + Math.random() * 2) + 's');
                c.style.animationDelay = (Math.random() * 0.5) + 's';
                c.style.width = (6 + Math.random() * 8) + 'px';
                c.style.height = (6 + Math.random() * 8) + 'px';
                document.body.appendChild(c);
                c.addEventListener('animationend', () => c.remove());
            }
        }

        // ========== 启动 ==========
        newQuestion();
    </script>
</body>

</html>
