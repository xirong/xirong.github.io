<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小天体直径放大对比 - 柳智天的宇宙课堂</title>
    <link rel="preconnect" href="https://fonts.loli.net">
    <link rel="preconnect" href="https://fonts.loli.net" crossorigin>
    <link
        href="https://fonts.loli.net/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Orbitron:wght@400;500;700;900&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --cosmic-dark: #0a0a0f;
            --accent-gold: #f4d03f;
            --accent-orange: #e67e22;
            --accent-cyan: #00d4ff;
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--cosmic-dark);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ============ 顶部标题 ============ */
        .header {
            text-align: center;
            padding: 40px 20px 10px;
        }

        .header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            background: linear-gradient(90deg, var(--accent-gold), var(--accent-orange));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 1rem;
        }

        .header .note {
            display: inline-block;
            margin-top: 12px;
            padding: 6px 16px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 15px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.8rem;
        }

        /* ============ 类型图例 ============ */
        .legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .legend-item {
            font-size: 0.85rem;
            padding: 6px 12px;
            border-radius: 15px;
        }

        .legend-item.terrestrial {
            background: rgba(139, 90, 43, 0.3);
            border: 1px solid #8b5a2b;
            color: #deb887;
        }

        .legend-item.jovian {
            background: rgba(100, 149, 237, 0.3);
            border: 1px solid #6495ed;
            color: #87ceeb;
        }

        .legend-item.dwarf {
            background: rgba(100, 180, 180, 0.3);
            border: 1px solid #64b5b5;
            color: #a0e0e0;
        }

        .legend-item.moon {
            background: rgba(170, 170, 170, 0.3);
            border: 1px solid #aaaaaa;
            color: #cccccc;
        }

        /* ============ 行星排列 ============ */
        .planets-row {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 30px;
            padding: 30px 40px 60px;
            min-height: 500px;
            overflow-x: auto;
        }

        .planet-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .planet-item .sphere {
            border-radius: 50%;
            box-shadow: 0 0 20px currentColor;
        }

        .planet-item .name {
            font-size: 0.95rem;
            color: var(--text-secondary);
        }

        .planet-item .size {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            color: var(--accent-cyan);
        }

        .planet-item .earth-ratio {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.4);
        }

        /* 类型标签 */
        .type-label {
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 10px;
            margin-top: 2px;
        }

        .type-label.terrestrial {
            background: rgba(139, 90, 43, 0.3);
            border: 1px solid #8b5a2b;
            color: #deb887;
        }

        .type-label.jovian {
            background: rgba(100, 149, 237, 0.3);
            border: 1px solid #6495ed;
            color: #87ceeb;
        }

        .type-label.dwarf {
            background: rgba(100, 180, 180, 0.3);
            border: 1px solid #64b5b5;
            color: #a0e0e0;
        }

        .type-label.moon {
            background: rgba(170, 170, 170, 0.3);
            border: 1px solid #aaaaaa;
            color: #cccccc;
        }

        /* ============ 返回链接 ============ */
        .back-link {
            position: fixed;
            left: 20px;
            bottom: 20px;
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 0.85rem;
            padding: 8px 16px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            z-index: 1000;
            transition: all 0.3s;
        }

        .back-link:hover {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
        }

        /* ============ 星空背景 ============ */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(1px 1px at 10% 20%, rgba(255, 255, 255, 0.6), transparent),
                radial-gradient(1px 1px at 30% 60%, rgba(255, 255, 255, 0.4), transparent),
                radial-gradient(1px 1px at 50% 10%, rgba(255, 255, 255, 0.5), transparent),
                radial-gradient(1px 1px at 70% 80%, rgba(255, 255, 255, 0.3), transparent),
                radial-gradient(1px 1px at 90% 40%, rgba(255, 255, 255, 0.5), transparent),
                radial-gradient(1px 1px at 15% 75%, rgba(255, 255, 255, 0.4), transparent),
                radial-gradient(1px 1px at 85% 15%, rgba(255, 255, 255, 0.3), transparent),
                radial-gradient(1.5px 1.5px at 25% 45%, rgba(200, 220, 255, 0.5), transparent),
                radial-gradient(1.5px 1.5px at 60% 30%, rgba(200, 220, 255, 0.4), transparent),
                radial-gradient(1.5px 1.5px at 75% 65%, rgba(255, 220, 200, 0.4), transparent);
            pointer-events: none;
            z-index: 0;
        }

        .header, .legend, .planets-row {
            position: relative;
            z-index: 1;
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>🔍 小天体直径放大对比</h1>
        <p>去掉太阳、木星、土星，以天王星为最大参照，看清每颗天体的真实比例</p>
        <div class="note">💡 所有球体按真实直径比例缩放，纹理为真实贴图</div>
    </div>

    <div class="legend">
        <span class="legend-item terrestrial">🪨 类地行星（岩石质）</span>
        <span class="legend-item jovian">💨 类木行星（气态）</span>
        <span class="legend-item dwarf">🧊 矮行星</span>
        <span class="legend-item moon">🌙 卫星</span>
    </div>

    <div class="planets-row" id="planetsRow">
        <!-- 动态生成 -->
    </div>

    <a href="solar-system.html" class="back-link">← 返回太阳系</a>

    <script>
        // ============ 天体数据（从大到小）============
        const planets = [
            { name: '天王星', diameter: 50724, category: 'jovian', texture: 'textures/uranus.jpg', color: '#7de8d5' },
            { name: '海王星', diameter: 49244, category: 'jovian', texture: 'textures/neptune.jpg', color: '#5b5ddf' },
            { name: '地球',   diameter: 12742, category: 'terrestrial', texture: 'textures/earth_daymap.jpg', color: '#6b93d6' },
            { name: '金星',   diameter: 12104, category: 'terrestrial', texture: 'textures/venus_atmosphere.jpg', color: '#e6c87a' },
            { name: '火星',   diameter: 6779,  category: 'terrestrial', texture: 'textures/mars.jpg', color: '#c1440e' },
            { name: '木卫三', diameter: 5268,  category: 'moon', texture: 'textures/ganymede.jpg', color: '#aabbcc' },
            { name: '水星',   diameter: 4879,  category: 'terrestrial', texture: 'textures/mercury.jpg', color: '#b5b5b5' },
            { name: '月球',   diameter: 3474,  category: 'moon', texture: 'textures/moon.jpg', color: '#aaaaaa' },
            { name: '冥王星', diameter: 2377,  category: 'dwarf', texture: 'textures/pluto.jpg', color: '#c9b59a' },
            { name: '谷神星', diameter: 940,   category: 'dwarf', texture: 'textures/ceres.jpg', color: '#9a9a8a' }
        ];

        // 类型标签
        const categoryLabels = {
            terrestrial: '🪨 岩石质',
            jovian: '💨 气态',
            dwarf: '🧊 矮行星',
            moon: '🌙 卫星'
        };

        // ============ 生成对比 ============
        const container = document.getElementById('planetsRow');
        const maxDiameter = planets[0].diameter; // 天王星
        const maxDisplaySize = 300; // 天王星显示为 300px

        planets.forEach(p => {
            const ratio = p.diameter / maxDiameter;
            const displaySize = Math.max(6, maxDisplaySize * ratio);

            // 地球直径倍数
            const earthRatio = (p.diameter / 12742).toFixed(2);
            let earthLabel;
            if (p.name === '地球') {
                earthLabel = '= 1 地球';
            } else if (earthRatio >= 1) {
                earthLabel = `= ${earthRatio} 地球`;
            } else {
                earthLabel = `= ${earthRatio} 地球`;
            }

            const bgStyle = `background: url('${p.texture}') center/cover;`;

            const div = document.createElement('div');
            div.className = 'planet-item';
            div.innerHTML = `
                <div class="sphere" style="
                    width: ${displaySize}px;
                    height: ${displaySize}px;
                    ${bgStyle}
                    color: ${p.color};
                "></div>
                <div class="name">${p.name}</div>
                <div class="size">${p.diameter.toLocaleString()} km</div>
                <div class="earth-ratio">${earthLabel}</div>
                <span class="type-label ${p.category}">${categoryLabels[p.category]}</span>
            `;
            container.appendChild(div);
        });
    </script>
</body>

</html>
