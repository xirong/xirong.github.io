<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>卡冈图雅 3D - 柳智天的宇宙课堂</title>
    <link rel="preconnect" href="https://fonts.loli.net">
    <link href="https://fonts.loli.net/css2?family=Noto+Sans+SC:wght@400;700&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; font-family: 'Noto Sans SC', sans-serif; }
        canvas { display: block; }

        .loading {
            position: fixed; inset: 0; z-index: 999; background: #000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.8s ease;
        }
        .loading.done { opacity: 0; pointer-events: none; }
        .ld-ring {
            width: 80px; height: 80px; position: relative;
        }
        .ld-ring .r {
            position: absolute; inset: 0; border: 3px solid transparent;
            border-top-color: #ffcc66; border-radius: 50%;
            animation: spin 1.2s linear infinite;
        }
        .ld-ring .r:nth-child(2) {
            inset: 12px; border-top-color: #fff;
            animation-duration: 1.8s; animation-direction: reverse;
        }
        .ld-ring .core {
            position: absolute; inset: 25px;
            background: radial-gradient(circle, #000 50%, transparent);
            border-radius: 50%;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .ld-text { margin-top: 20px; color: rgba(255,255,255,0.4); font-size: 0.85rem; letter-spacing: 2px; }

        .header {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            padding: 16px 24px; display: flex; justify-content: space-between; align-items: center;
            background: linear-gradient(180deg, rgba(0,0,0,0.7) 0%, transparent 100%);
            pointer-events: none;
        }
        .header > * { pointer-events: auto; }
        .logo { display: flex; align-items: center; gap: 12px; }
        .logo-icon {
            width: 42px; height: 42px;
            background: radial-gradient(circle, #000 30%, #ffaa44 55%, #663300 100%);
            border-radius: 50%; font-size: 18px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px rgba(255,170,68,0.5);
        }
        .logo h1 {
            font-family: 'Orbitron', sans-serif; font-size: 1.2rem;
            background: linear-gradient(90deg, #ffcc66, #fff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; letter-spacing: 2px;
        }
        .logo p { font-size: 0.7rem; color: rgba(255,255,255,0.4); }

        .hint {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
            z-index: 100; padding: 8px 18px;
            background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px; color: rgba(255,255,255,0.4);
            font-size: 0.75rem; backdrop-filter: blur(8px);
            transition: opacity 2s ease; pointer-events: none;
        }
        .hint.hide { opacity: 0; }

        .home-link {
            position: fixed; bottom: 24px; left: 24px; z-index: 100;
            display: flex; align-items: center; gap: 6px;
            padding: 10px 16px; background: rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 20px;
            color: rgba(255,255,255,0.5); text-decoration: none; font-size: 0.8rem;
            backdrop-filter: blur(8px); transition: all 0.3s ease;
        }
        .home-link:hover { color: #fff; border-color: #ffcc66; }

        /* 知识标注 */
        .annotations {
            position: fixed; right: 20px; top: 50%; transform: translateY(-50%);
            z-index: 100; display: flex; flex-direction: column; gap: 8px;
        }
        .ann-btn {
            padding: 8px 14px; background: rgba(0,0,0,0.6);
            border: 1px solid rgba(255,200,100,0.2); border-radius: 12px;
            color: rgba(255,255,255,0.6); font-size: 0.75rem;
            cursor: pointer; backdrop-filter: blur(8px);
            transition: all 0.3s ease; text-align: left;
        }
        .ann-btn:hover { border-color: #ffcc66; color: #fff; background: rgba(255,170,68,0.15); }
        .ann-btn .ann-title { font-weight: 700; margin-bottom: 2px; }
        .ann-btn .ann-desc { font-size: 0.65rem; color: rgba(255,255,255,0.35); line-height: 1.4; }

        @media (max-width: 600px) {
            .logo h1 { font-size: 1rem; }
            .logo p { display: none; }
            .annotations { right: 10px; }
            .ann-btn { padding: 6px 10px; font-size: 0.65rem; }
        }
    </style>
</head>
<body>
    <div class="loading" id="loading">
        <div class="ld-ring"><div class="r"></div><div class="r"></div><div class="core"></div></div>
        <div class="ld-text">正在汇聚吸积盘...</div>
    </div>

    <div class="header">
        <div class="logo">
            <div class="logo-icon">🕳️</div>
            <div>
                <h1>GARGANTUA</h1>
                <p>3D 交互 · 纹理驱动</p>
            </div>
        </div>
    </div>

    <div class="annotations" id="annotations">
        <div class="ann-btn" data-target="singularity">
            <div class="ann-title">⚫ 奇点</div>
            <div class="ann-desc">所有质量压缩到无限小的一个点</div>
        </div>
        <div class="ann-btn" data-target="horizon">
            <div class="ann-title">🔴 事件视界</div>
            <div class="ann-desc">越过就回不来了，连光也不行</div>
        </div>
        <div class="ann-btn" data-target="photon">
            <div class="ann-title">💫 光子环</div>
            <div class="ann-desc">光绕着黑洞转圈形成的光环</div>
        </div>
        <div class="ann-btn" data-target="disk">
            <div class="ann-title">🌀 吸积盘</div>
            <div class="ann-desc">被吸入的物质旋转形成的超高温盘</div>
        </div>
        <div class="ann-btn" data-target="lens">
            <div class="ann-title">🔮 引力透镜</div>
            <div class="ann-desc">黑洞弯曲背后的光线形成的弧</div>
        </div>
    </div>

    <div class="hint" id="hint">拖拽微调视角 / 滚轮缩放 / 双指捏合</div>
    <a class="home-link" href="blackhole.html">← 返回黑洞探索</a>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script>
    // ============ 等待 Three.js 加载 ============
    function waitForThree() {
        return new Promise(resolve => {
            if (window.THREE && THREE.EffectComposer) { resolve(); return; }
            const check = setInterval(() => {
                if (window.THREE && THREE.EffectComposer) {
                    clearInterval(check);
                    resolve();
                }
            }, 50);
        });
    }

    waitForThree().then(init);

    function init() {
        const W = window.innerWidth;
        const H = window.innerHeight;

        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x02040a, 0.006);

        const camera = new THREE.PerspectiveCamera(34, W / H, 0.1, 400);
        camera.position.set(0.1, 0.55, 23.2);

        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
        renderer.setSize(W, H);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.outputEncoding = THREE.sRGBEncoding;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 0.82;
        document.body.appendChild(renderer.domElement);

        // ============ 后处理（强化星际穿越的柔光包裹感） ============
        const composer = new THREE.EffectComposer(renderer);
        composer.addPass(new THREE.RenderPass(scene, camera));

        const bloomPass = new THREE.UnrealBloomPass(
            new THREE.Vector2(W, H),
            0.62,
            0.78,
            0.42
        );
        composer.addPass(bloomPass);

        // ============ 控制器 ============
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.06;
        controls.enablePan = false;
        controls.minDistance = 13;
        controls.maxDistance = 34;
        controls.minPolarAngle = Math.PI * 0.48;
        controls.maxPolarAngle = Math.PI * 0.52;
        controls.minAzimuthAngle = -0.5;
        controls.maxAzimuthAngle = 0.5;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.16;
        controls.target.set(0, 0.0, 0);
        controls.addEventListener('start', () => { controls.autoRotate = false; });

        // ============ 纹理 ============
        const textureLoader = new THREE.TextureLoader();
        const maxAniso = renderer.capabilities.getMaxAnisotropy ? renderer.capabilities.getMaxAnisotropy() : 1;

        const bgTexture = textureLoader.load('textures/starfield.jpg');
        const diskTextureA = textureLoader.load('textures/stars/yellow_star_surface.jpg');
        const diskTextureB = textureLoader.load('textures/stars/white_star_surface.jpg');
        const diskTextureC = textureLoader.load('textures/stars/orange_star_surface.jpg');

        [bgTexture, diskTextureA, diskTextureB, diskTextureC].forEach(tex => {
            tex.wrapS = THREE.RepeatWrapping;
            tex.wrapT = THREE.RepeatWrapping;
            tex.anisotropy = maxAniso;
            tex.encoding = THREE.sRGBEncoding;
        });

        // ============ 星空球壳 ============
        const starSphere = new THREE.Mesh(
            new THREE.SphereGeometry(180, 48, 48),
            new THREE.MeshBasicMaterial({
                map: bgTexture,
                side: THREE.BackSide,
                color: 0xb3cfff
            })
        );
        starSphere.rotation.y = Math.PI * 0.22;
        scene.add(starSphere);

        // ============ 自定义材质 ============
        function createGlowTexture(size, innerColor, midColor, outerColor) {
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');

            const gradient = ctx.createRadialGradient(
                size / 2, size / 2, 0,
                size / 2, size / 2, size / 2
            );
            gradient.addColorStop(0, innerColor);
            gradient.addColorStop(0.35, midColor);
            gradient.addColorStop(1, outerColor);

            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, size, size);

            const tex = new THREE.CanvasTexture(canvas);
            tex.encoding = THREE.sRGBEncoding;
            return tex;
        }

        function createDiskMaterial() {
            return new THREE.ShaderMaterial({
                uniforms: {
                    time: { value: 0 },
                    texA: { value: diskTextureA },
                    texB: { value: diskTextureB },
                    texC: { value: diskTextureC },
                    innerNorm: { value: 5.2 / 15.8 }
                },
                vertexShader: `
                    varying vec2 vUv;
                    varying vec3 vWorldPos;
                    varying vec3 vViewDir;

                    void main() {
                        vUv = uv;
                        vec4 worldPos = modelMatrix * vec4(position, 1.0);
                        vWorldPos = worldPos.xyz;
                        vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                        vViewDir = normalize(-mvPosition.xyz);
                        gl_Position = projectionMatrix * mvPosition;
                    }
                `,
                fragmentShader: `
                    precision highp float;

                    uniform float time;
                    uniform sampler2D texA;
                    uniform sampler2D texB;
                    uniform sampler2D texC;
                    uniform float innerNorm;

                    varying vec2 vUv;
                    varying vec3 vWorldPos;
                    varying vec3 vViewDir;

                    #define PI 3.14159265359

                    float luma(vec3 c) {
                        return dot(c, vec3(0.299, 0.587, 0.114));
                    }

                    void main() {
                        vec2 p = vUv * 2.0 - 1.0;
                        float r = length(p);
                        if (r <= innerNorm || r >= 1.0) discard;

                        float angle = atan(p.y, p.x) / (2.0 * PI) + 0.5;
                        float radialT = clamp((r - innerNorm) / (1.0 - innerNorm), 0.0, 1.0);

                        float tex1 = luma(texture2D(texA, vec2(
                            fract(angle * 5.8 - time * 0.07 + radialT * 1.1),
                            fract(radialT * 2.3 + time * 0.02)
                        )).rgb);
                        float tex2 = luma(texture2D(texB, vec2(
                            fract(angle * -9.6 - time * 0.12 + tex1 * 0.12),
                            fract(radialT * 3.0 - time * 0.03)
                        )).rgb);
                        float tex3 = luma(texture2D(texC, vec2(
                            fract(angle * 13.0 + time * 0.05),
                            fract(radialT * 4.4 + tex2 * 0.16)
                        )).rgb);

                        float streak = clamp(tex1 * 0.55 + tex2 * 0.78 + tex3 * 0.35, 0.0, 1.45);
                        float hotCore = exp(-pow((r - (innerNorm + 0.02)) / 0.036, 2.0));
                        float innerGlow = pow(1.0 - radialT, 1.55);
                        float edgeFade = smoothstep(innerNorm, innerNorm + 0.02, r) *
                                         (1.0 - smoothstep(0.74, 0.98, r));
                        float doppler = 1.0 + clamp(vWorldPos.x / 18.0, -1.0, 1.0) * 0.32;
                        float turbulence = smoothstep(0.16, 0.95, streak);
                        float perspective = 0.55 + 0.45 * pow(1.0 - abs(vViewDir.y), 0.35);

                        vec3 deep = vec3(0.42, 0.14, 0.05);
                        vec3 warm = vec3(1.0, 0.82, 0.45);
                        vec3 whiteHot = vec3(0.95, 0.97, 1.0);

                        vec3 color = mix(deep, warm, innerGlow * 0.85 + turbulence * 0.18);
                        color = mix(color, whiteHot, smoothstep(0.55, 1.2, hotCore + streak * 0.48));
                        color *= (0.16 + innerGlow * 0.82 + streak * 0.24) * doppler;

                        float alpha = edgeFade * perspective * (0.1 + turbulence * 0.42);
                        alpha *= 0.45 + hotCore * 0.65;

                        if (alpha < 0.02) discard;
                        gl_FragColor = vec4(color, clamp(alpha, 0.0, 1.0));
                    }
                `,
                transparent: true,
                side: THREE.DoubleSide,
                depthWrite: false,
                blending: THREE.AdditiveBlending
            });
        }

        function createLensMaterial(polarity, boost) {
            return new THREE.ShaderMaterial({
                uniforms: {
                    time: { value: 0 },
                    texA: { value: diskTextureA },
                    texB: { value: diskTextureB },
                    texC: { value: diskTextureC },
                    polarity: { value: polarity },
                    boost: { value: boost }
                },
                vertexShader: `
                    varying vec2 vUv;
                    varying vec3 vWorldPos;
                    varying vec3 vNormalW;

                    void main() {
                        vUv = uv;
                        vec4 worldPos = modelMatrix * vec4(position, 1.0);
                        vWorldPos = worldPos.xyz;
                        vNormalW = normalize(mat3(modelMatrix) * normal);
                        gl_Position = projectionMatrix * viewMatrix * worldPos;
                    }
                `,
                fragmentShader: `
                    precision highp float;

                    uniform float time;
                    uniform sampler2D texA;
                    uniform sampler2D texB;
                    uniform sampler2D texC;
                    uniform float polarity;
                    uniform float boost;

                    varying vec2 vUv;
                    varying vec3 vWorldPos;
                    varying vec3 vNormalW;

                    float luma(vec3 c) {
                        return dot(c, vec3(0.299, 0.587, 0.114));
                    }

                    void main() {
                        float hemi = smoothstep(0.0, 1.35, polarity * vWorldPos.y + 0.2);
                        float tube = abs(vUv.y - 0.5) * 2.0;
                        float tubeMask = exp(-pow(tube / 0.72, 2.0));
                        float arc = vUv.x;

                        float tex1 = luma(texture2D(texB, vec2(
                            fract(arc * 3.2 - time * 0.04),
                            fract(tube * 0.9 + time * 0.02)
                        )).rgb);
                        float tex2 = luma(texture2D(texA, vec2(
                            fract(arc * 7.6 + time * 0.05 + tube * 0.25),
                            fract(tube * 1.9 - time * 0.01)
                        )).rgb);
                        float tex3 = luma(texture2D(texC, vec2(
                            fract(arc * -11.0 - time * 0.06),
                            fract(tube * 2.7 + tex1 * 0.22)
                        )).rgb);

                        float streak = clamp(tex1 * 0.36 + tex2 * 0.78 + tex3 * 0.3, 0.0, 1.5);
                        float centerBoost = 0.68 + 0.32 * exp(-pow(vWorldPos.x / 10.0, 2.0));
                        float spanMask = 1.0 - smoothstep(6.0, 9.2, abs(vWorldPos.x));
                        float fresnel = pow(1.0 - abs(dot(normalize(vNormalW), vec3(0.0, 0.0, 1.0))), 1.35);

                        vec3 warm = vec3(1.0, 0.84, 0.58);
                        vec3 whiteHot = vec3(0.99, 0.98, 1.0);
                        vec3 color = mix(warm, whiteHot, smoothstep(0.48, 1.2, streak + fresnel * 0.42));
                        color *= boost * (0.28 + streak * 0.52 + fresnel * 0.12) * centerBoost * (0.45 + spanMask * 0.55);

                        float alpha = hemi * tubeMask * (0.12 + streak * 0.32 + fresnel * 0.08) * spanMask;
                        if (alpha < 0.02) discard;

                        gl_FragColor = vec4(color, clamp(alpha, 0.0, 1.0));
                    }
                `,
                transparent: true,
                depthWrite: false,
                blending: THREE.AdditiveBlending
            });
        }

        function createLensingSheetMaterial() {
            return new THREE.ShaderMaterial({
                uniforms: {
                    time: { value: 0 },
                    texA: { value: diskTextureA },
                    texB: { value: diskTextureB },
                    texC: { value: diskTextureC }
                },
                vertexShader: `
                    varying vec2 vUv;

                    void main() {
                        vUv = uv;
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    precision highp float;

                    uniform float time;
                    uniform sampler2D texA;
                    uniform sampler2D texB;
                    uniform sampler2D texC;

                    varying vec2 vUv;

                    float luma(vec3 c) {
                        return dot(c, vec3(0.299, 0.587, 0.114));
                    }

                    void main() {
                        vec2 p = vUv * 2.0 - 1.0;

                        float gTop = exp(-(p.x * p.x) / (2.0 * 0.42 * 0.42));
                        float topY = 0.08 + gTop * 0.52;
                        float topW = mix(0.035, 0.12, gTop);
                        float topBand = exp(-pow((p.y - topY) / topW, 2.0));

                        float gBot = exp(-(p.x * p.x) / (2.0 * 0.34 * 0.34));
                        float botY = -0.16 - gBot * 0.48;
                        float botW = mix(0.03, 0.1, gBot);
                        float botBand = exp(-pow((p.y - botY) / botW, 2.0));

                        float arcFlow = p.x * 0.5 + 0.5;
                        float topTex1 = luma(texture2D(texB, vec2(
                            fract(arcFlow * 3.2 - time * 0.03),
                            fract(abs(p.y - topY) * 3.5 + time * 0.01)
                        )).rgb);
                        float topTex2 = luma(texture2D(texA, vec2(
                            fract(arcFlow * 8.5 + time * 0.04),
                            fract(abs(p.y - topY) * 1.8 - time * 0.02)
                        )).rgb);
                        float botTex = luma(texture2D(texC, vec2(
                            fract(arcFlow * 6.4 - time * 0.035),
                            fract(abs(p.y - botY) * 2.2 + time * 0.01)
                        )).rgb);

                        float topStreak = clamp(topTex1 * 0.35 + topTex2 * 0.7, 0.0, 1.2);
                        float botStreak = clamp(botTex * 0.65 + topTex1 * 0.18, 0.0, 1.0);

                        float sideFade = 0.35 + 0.65 * (1.0 - smoothstep(0.5, 1.0, abs(p.x)));
                        float halo = exp(-dot(vec2(p.x * 0.75, p.y * 1.1), vec2(p.x * 0.75, p.y * 1.1)) * 1.6) * 0.05;
                        float topCore = exp(-pow(p.x / 0.33, 2.0)) *
                                        exp(-pow((p.y - (topY - topW * 0.15)) / (topW * 1.45), 2.0));

                        vec3 topColor = mix(vec3(0.78, 0.8, 0.88), vec3(1.0, 0.99, 0.96), smoothstep(0.2, 1.0, topStreak));
                        vec3 botColor = mix(vec3(0.72, 0.76, 0.86), vec3(1.0, 0.95, 0.9), smoothstep(0.25, 1.0, botStreak));

                        vec3 color = vec3(0.0);
                        color += topColor * topBand * (0.12 + topStreak * 0.22) * sideFade;
                        color += vec3(1.0, 0.99, 0.97) * topCore * 0.12;
                        color += botColor * botBand * (0.05 + botStreak * 0.09) * sideFade * 0.82;
                        color += vec3(0.5, 0.6, 0.8) * halo;

                        float alpha = topBand * (0.12 + topStreak * 0.18) * sideFade;
                        alpha += topCore * 0.08;
                        alpha += botBand * (0.05 + botStreak * 0.08) * sideFade * 0.82;
                        alpha += halo * 0.4;

                        if (alpha < 0.01) discard;
                        gl_FragColor = vec4(color, clamp(alpha, 0.0, 0.45));
                    }
                `,
                transparent: true,
                depthWrite: false,
                blending: THREE.AdditiveBlending
            });
        }

        // ============ 柔和辉光 ============
        const blueHalo = new THREE.Sprite(
            new THREE.SpriteMaterial({
                map: createGlowTexture(
                    512,
                    'rgba(255,255,255,0.85)',
                    'rgba(184,205,255,0.24)',
                    'rgba(0,0,0,0)'
                ),
                transparent: true,
                opacity: 0.05,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            })
        );
        blueHalo.scale.set(28, 28, 1);
        blueHalo.position.set(0, 0, -1.8);
        scene.add(blueHalo);

        const warmHalo = new THREE.Sprite(
            new THREE.SpriteMaterial({
                map: createGlowTexture(
                    512,
                    'rgba(255,245,228,0.92)',
                    'rgba(255,199,133,0.28)',
                    'rgba(0,0,0,0)'
                ),
                transparent: true,
                opacity: 0.04,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            })
        );
        warmHalo.scale.set(18, 18, 1);
        warmHalo.position.set(0, 0, -1.3);
        scene.add(warmHalo);

        // ============ 黑洞主体 ============
        const blackHole = new THREE.Mesh(
            new THREE.SphereGeometry(4.35, 96, 96),
            new THREE.MeshBasicMaterial({ color: 0x000000 })
        );
        scene.add(blackHole);

        const photonRing = new THREE.Mesh(
            new THREE.TorusGeometry(4.6, 0.09, 20, 320),
            new THREE.MeshBasicMaterial({
                color: 0xfffaef,
                transparent: true,
                opacity: 0.34,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            })
        );
        scene.add(photonRing);

        const photonHalo = new THREE.Mesh(
            new THREE.TorusGeometry(4.8, 0.24, 20, 320),
            new THREE.MeshBasicMaterial({
                color: 0xffe8c8,
                transparent: true,
                opacity: 0.08,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            })
        );
        scene.add(photonHalo);

        // ============ 纹理驱动的吸积盘 ============
        const disk = new THREE.Mesh(
            new THREE.RingGeometry(5.2, 15.8, 320),
            createDiskMaterial()
        );
        disk.rotation.x = Math.PI / 2;
        scene.add(disk);

        const diskGlow = new THREE.Mesh(
            new THREE.RingGeometry(5.0, 16.8, 240),
            new THREE.MeshBasicMaterial({
                color: 0xffe0b8,
                transparent: true,
                opacity: 0.02,
                side: THREE.DoubleSide,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            })
        );
        diskGlow.rotation.x = Math.PI / 2;
        scene.add(diskGlow);

        const lensSheet = new THREE.Mesh(
            new THREE.PlaneGeometry(30, 20, 1, 1),
            createLensingSheetMaterial()
        );
        lensSheet.position.set(0, 0.05, -0.8);
        scene.add(lensSheet);

        // ============ 透镜弧，重点贴近星际穿越的上大下小 ============
        const topLens = new THREE.Mesh(
            new THREE.TorusGeometry(5.7, 0.72, 48, 320),
            createLensMaterial(1, 0.34)
        );
        topLens.scale.set(1.32, 0.76, 0.6);
        topLens.position.y = 0.3;
        topLens.visible = false;

        const bottomLens = new THREE.Mesh(
            new THREE.TorusGeometry(4.8, 0.58, 40, 320),
            createLensMaterial(-1, 0.25)
        );
        bottomLens.scale.set(1.12, 0.82, 0.6);
        bottomLens.position.y = -0.58;
        bottomLens.visible = false;

        const outerLensGlow = new THREE.Mesh(
            new THREE.TorusGeometry(8.2, 1.7, 36, 240),
            new THREE.MeshBasicMaterial({
                color: 0xcad9ff,
                transparent: true,
                opacity: 0.018,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            })
        );
        outerLensGlow.scale.set(1.18, 0.82, 0.62);
        outerLensGlow.position.y = 0.08;
        outerLensGlow.visible = false;

        // ============ 标注交互 ============
        const annBtns = document.querySelectorAll('.ann-btn');
        const focusTargets = {
            singularity: { pos: new THREE.Vector3(0, 0.3, 11.8) },
            horizon: { pos: new THREE.Vector3(0, 0.6, 13.4) },
            photon: { pos: new THREE.Vector3(0.15, 1.0, 15.0) },
            disk: { pos: new THREE.Vector3(0, 1.4, 19.5) },
            lens: { pos: new THREE.Vector3(0, 2.2, 23.5) }
        };
        let activeHighlight = null;

        annBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const target = btn.dataset.target;
                if (activeHighlight === target) {
                    annBtns.forEach(b => b.style.borderColor = '');
                    activeHighlight = null;
                    return;
                }
                annBtns.forEach(b => b.style.borderColor = '');
                btn.style.borderColor = '#ffcc66';
                activeHighlight = target;

                if (focusTargets[target]) {
                    smoothMoveTo(focusTargets[target].pos);
                }
            });
        });

        function smoothMoveTo(nextPos) {
            controls.autoRotate = false;
            const start = camera.position.clone();
            const duration = 1200;
            const startTime = performance.now();

            function step() {
                const p = Math.min(1, (performance.now() - startTime) / duration);
                const ease = 1.0 - Math.pow(1.0 - p, 3.0);
                camera.position.lerpVectors(start, nextPos, ease);
                if (p < 1) {
                    requestAnimationFrame(step);
                }
            }

            step();
        }

        // ============ 动画 ============
        function animate() {
            requestAnimationFrame(animate);

            const t = performance.now() * 0.001;
            disk.material.uniforms.time.value = t;
            lensSheet.material.uniforms.time.value = t;
            topLens.material.uniforms.time.value = t;
            bottomLens.material.uniforms.time.value = t;

            starSphere.rotation.y = Math.PI * 0.22 + t * 0.003;

            topLens.rotation.z = Math.sin(t * 0.18) * 0.035;
            bottomLens.rotation.z = -Math.sin(t * 0.22) * 0.02;
            photonRing.material.opacity = 0.32 + Math.sin(t * 1.9) * 0.025;
            photonHalo.material.opacity = 0.07 + Math.sin(t * 1.2 + 0.5) * 0.015;
            blueHalo.material.opacity = 0.045 + Math.sin(t * 0.6) * 0.008;
            warmHalo.material.opacity = 0.035 + Math.cos(t * 0.7) * 0.007;

            controls.update();
            composer.render();
        }

        // ============ 响应式 ============
        window.addEventListener('resize', () => {
            const w = window.innerWidth;
            const h = window.innerHeight;
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);
            composer.setSize(w, h);
        });

        // ============ 启动 ============
        document.getElementById('loading').classList.add('done');
        animate();
        setTimeout(() => document.getElementById('hint').classList.add('hide'), 5000);
    }
    </script>
</body>
</html>
